<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mochi's Room Editor</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, sans-serif;
      background: #1a1428;
      color: #ede6f8;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ── Room picker row ── */
    .room-picker {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.3);
      overflow-x: auto;
      flex-shrink: 0;
      align-items: center;
    }
    .room-picker-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px;
      color: rgba(255,255,255,0.3); margin-right: 4px; flex-shrink: 0;
    }
    .room-thumb {
      width: 48px; height: 48px;
      border-radius: 6px;
      border: 2px solid transparent;
      cursor: pointer;
      image-rendering: pixelated;
      flex-shrink: 0;
      transition: border-color 0.15s;
    }
    .room-thumb:hover { border-color: rgba(180,160,240,0.4); }
    .room-thumb.active { border-color: #6C5CE7; }

    /* ── Main area ── */
    .main-area { display: flex; flex: 1; min-height: 0; }

    /* ── Palette sidebar ── */
    .palette {
      width: 240px;
      background: rgba(0,0,0,0.2);
      border-right: 1px solid rgba(255,255,255,0.08);
      overflow-y: auto;
      flex-shrink: 0;
      padding: 8px 10px;
    }
    .palette::-webkit-scrollbar { width: 6px; }
    .palette::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    .pal-cat {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px;
      color: rgba(255,255,255,0.35); margin: 12px 0 6px; cursor: pointer;
    }
    .pal-cat:first-child { margin-top: 4px; }
    .pal-cat::before { content: '▸ '; font-size: 8px; }
    .pal-cat.open::before { content: '▾ '; }
    .pal-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .pal-grid.hidden { display: none; }
    .pal-item {
      aspect-ratio: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
    }
    .pal-item:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.15); }
    .pal-item:active { cursor: grabbing; }
    .pal-item canvas {
      width: 100%; height: 100%;
      image-rendering: pixelated;
    }
    .pal-item-label {
      position: absolute; bottom: 1px; left: 0; right: 0;
      font-size: 7px; text-align: center; color: rgba(255,255,255,0.4);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      padding: 0 2px;
    }

    /* ── Room canvas area ── */
    .room-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      position: relative;
    }
    #room-canvas {
      image-rendering: pixelated;
      border-radius: 8px;
      cursor: crosshair;
      max-width: 100%;
      max-height: 100%;
    }

    /* ── Bottom bar ── */
    .bottom-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: rgba(0,0,0,0.3);
      flex-shrink: 0;
    }
    .mode-toggle { display: flex; gap: 4px; }
    .mode-btn {
      padding: 5px 14px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      color: #ede6f8; font-size: 11px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .mode-btn:hover { background: rgba(255,255,255,0.1); }
    .mode-btn.active { background: rgba(108,92,231,0.4); border-color: rgba(108,92,231,0.5); }
    .hint { font-size: 10px; color: rgba(255,255,255,0.3); }

    /* ── Drag ghost ── */
    .drag-ghost {
      position: fixed; pointer-events: none; z-index: 999;
      image-rendering: pixelated; opacity: 0.75;
    }
  </style>
</head>
<body>

  <div class="room-picker" id="room-picker">

// ═══════ IMAGE LOADING ═══════
const itemImgs = {};
const imgSrcSet = new Set();
for (const item of CATALOG) {
  if (!imgSrcSet.has(item.src)) {
    imgSrcSet.add(item.src);
    const img = new Image();
    img.onload = () => { itemImgs[item.src] = img; };
    img.src = item.src;
  }

// Room images
const roomImgs = {};

// ═══════ MOCHI ═══════
const ANIMS = {
  idle:    { src: SPRITES+'Idle.png',    frames:10, speed:150 },
  idle2:   { src: SPRITES+'Idle2.png',   frames:10, speed:150 },
  sleep:   { src: SPRITES+'Sleep.png',   frames:4,  speed:350 },
  laydown: { src: SPRITES+'LayDown.png', frames:12, speed:140, once:true },
  eating:  { src: SPRITES+'Eating.png',  frames:15, speed:120 },
  dance:   { src: SPRITES+'Dance.png',   frames:4,  speed:180 },
  excited: { src: SPRITES+'Excited.png', frames:12, speed:120 },
  waiting: { src: SPRITES+'Waiting.png', frames:6,  speed:200 },
};
const mochiImgs = {};
for (const [name, a] of Object.entries(ANIMS)) {
  const img = new Image();
  img.onload = () => { mochiImgs[name] = img; };
  img.src = a.src;
}

let mochiAnim = 'idle', mochiFrame = 0, mochiLastT = 0, mochiAnimCb = null;
let mochiX = 240, mochiY = 350, mochiTargetX = null, mochiTargetY = null, mochiFlip = false, mochiMoveCb = null;

// ═══════ FOOD BOWL STATE ═══════
// Bowl fullness: stored per-room in localStorage
// Key: bowlState_{roomNum} = { "itemIndex": fullness (0-1) }
function getBowlStates() {
  const s = localStorage.getItem('bowlState_' + currentRoom);
  return s ? JSON.parse(s) : {};
}
function saveBowlStates(states) {
  localStorage.setItem('bowlState_' + currentRoom, JSON.stringify(states));
}
function isBowlItem(id) {
  return id && id.startsWith('bowl-');
}

// ═══════ AUTONOMOUS MOCHI (Play Mode) ═══════
let autoWanderTimer = null;

function startAutoWander() {
  stopAutoWander();
  if (mode !== 'play') return;

  const wander = () => {
    if (mode !== 'play' || mochiTargetX !== null) {
      autoWanderTimer = setTimeout(wander, 3000);
      return;
    }

    const items = getPlacedItems();
    if (items.length > 0 && Math.random() > 0.3) {
      // Go interact with a random placed item
      const idx = Math.floor(Math.random() * items.length);
      const item = items[idx];
      const def = CATALOG.find(f => f.id === item.id);
      const dims = getItemDims(item);
      const tx = item.x + dims.w/2 - S/2;
      const ty = item.y + dims.h - S;
      const interact = def?.interact || 'play';

      mochiMoveTo(tx, ty, () => {
        if (interact === 'eat' && isBowlItem(item.id)) {
          // Eat from bowl — deplete it
          const states = getBowlStates();
          const key = '' + idx;
          const fullness = states[key] !== undefined ? states[key] : 1;
          if (fullness > 0) {
            mochiPlay('eating', () => {
              states[key] = Math.max(0, fullness - 0.34);
              saveBowlStates(states);
              mochiPlay('idle');
            });
          } else {
            mochiPlay('waiting', () => mochiPlay('idle'));
          }
        } else if (interact === 'sleep') {
          mochiPlay('laydown', () => {
            setTimeout(() => mochiPlay('idle'), 3000 + Math.random() * 4000);
          });
        } else if (interact === 'eat') {
          mochiPlay('eating', () => mochiPlay('idle'));
        } else {
          mochiPlay('excited', () => mochiPlay('dance'));
        }
      });
    } else {
      // Random walk to empty spot
      const rx = 100 + Math.random() * 300;
      const ry = 250 + Math.random() * 200;
      mochiMoveTo(rx, ry, () => {
        const idleAnims = ['idle', 'idle2', 'waiting'];
        mochiPlay(idleAnims[Math.floor(Math.random() * idleAnims.length)]);
      });
    }

    autoWanderTimer = setTimeout(wander, 5000 + Math.random() * 8000);
  };

  autoWanderTimer = setTimeout(wander, 2000);
}

function stopAutoWander() {
  if (autoWanderTimer) { clearTimeout(autoWanderTimer); autoWanderTimer = null; }
}

function mochiPlay(name, cb) {
  if (!ANIMS[name]) return;
  mochiAnim = name; mochiFrame = 0; mochiLastT = 0; mochiAnimCb = cb || null;
}
function mochiMoveTo(tx, ty, cb) {
  mochiTargetX = tx; mochiTargetY = ty;
  mochiFlip = tx < mochiX;
  mochiPlay('idle2'); mochiMoveCb = cb || null;
}
function loadMochiPos() {
  const s = localStorage.getItem('mochiPos_' + currentRoom);
  if (s) { const p = JSON.parse(s); mochiX = p.x; mochiY = p.y; }
  else { mochiX = 240; mochiY = 350; }
  mochiTargetX = null; mochiTargetY = null;
}
function saveMochiPos() {
  localStorage.setItem('mochiPos_' + currentRoom, JSON.stringify({ x: mochiX, y: mochiY }));
}

// ═══════ ROOM STATE ═══════
let roomBgImg = null;
const roomCanvas = document.getElementById('room-canvas');
const rctx = roomCanvas.getContext('2d');
rctx.imageSmoothingEnabled = false;

function loadRoom(num) {
  currentRoom = num;
  localStorage.setItem('currentRoom', num);
  loadMochiPos();
  loadRoomLayout();
  document.querySelectorAll('.room-thumb').forEach((t, i) => t.classList.toggle('active', i + 1 === num));
  if (roomImgs[num]) { roomBgImg = roomImgs[num]; }
  else {
    const img = new Image();
    img.onload = () => { roomImgs[num] = img; roomBgImg = img; };
    img.src = ROOM_BASE + num + '.png';
  }
}
function loadRoomLayout() {
  const s = localStorage.getItem('roomLayout_' + currentRoom);
  roomLayouts[currentRoom] = s ? JSON.parse(s) : [];
}
function saveRoomLayout() {
  localStorage.setItem('roomLayout_' + currentRoom, JSON.stringify(roomLayouts[currentRoom] || []));
}
function getPlacedItems() { return roomLayouts[currentRoom] || []; }

// Get the draw dimensions for an item
function getItemDims(item) {
  const def = CATALOG.find(f => f.id === item.id);
  if (def) return { w: def.cropW || def.w, h: def.cropH || def.h };
  return { w: 32, h: 32 };
}

// Draw a single item onto a context
function drawItem(ctx, item, x, y) {
  const def = CATALOG.find(f => f.id === item.id);
  if (def) {
    const img = itemImgs[def.src];
    if (!img) return;
    if (def.cropW) {
      ctx.drawImage(img, def.cropX||0, def.cropY||0, def.cropW, def.cropH, x, y, def.cropW, def.cropH);
    } else {
      ctx.drawImage(img, x, y, def.w, def.h);
    }
  }
}

// ═══════ RENDER ═══════
let dragPreview = null;

function render(t) {
  rctx.clearRect(0, 0, 512, 512);
  if (roomBgImg) rctx.drawImage(roomBgImg, 0, 0, 512, 512);

  const drawables = [];

  // Placed items
  const bowlStates = getBowlStates();
  const placedItems = getPlacedItems();
  for (let i = 0; i < placedItems.length; i++) {
    const item = placedItems[i];
    const dims = getItemDims(item);
    const idx = i;
    drawables.push({ y: item.y + dims.h, draw: () => {
      drawItem(rctx, item, item.x, item.y);
      // Draw bowl fullness indicator
      if (isBowlItem(item.id)) {
        const fullness = bowlStates['' + idx] !== undefined ? bowlStates['' + idx] : 1;
        if (fullness < 1) {
          // Draw a small bar under the bowl
          const bw = dims.w, bx = item.x, by = item.y + dims.h + 2;
          rctx.fillStyle = 'rgba(0,0,0,0.4)';
          rctx.fillRect(bx, by, bw, 3);
          rctx.fillStyle = fullness > 0.5 ? '#6BFFB8' : fullness > 0 ? '#FFD96B' : '#FF6B6B';
          rctx.fillRect(bx, by, bw * fullness, 3);
        }
      }
    }});
  }

  // Mochi movement
  if (mochiTargetX !== null) {
    const dx = mochiTargetX - mochiX, dy = mochiTargetY - mochiY;
    const dist = Math.hypot(dx, dy);
    if (dist < 3) {
      mochiX = mochiTargetX; mochiY = mochiTargetY;
      mochiTargetX = null; mochiTargetY = null;
      saveMochiPos();
      if (mochiMoveCb) { const cb = mochiMoveCb; mochiMoveCb = null; cb(); }
      else mochiPlay('idle');
    } else {
      mochiX += (dx / dist) * 2;
      mochiY += (dy / dist) * 2;
    }
  }

  // Mochi frame
  const ad = ANIMS[mochiAnim], ai = mochiImgs[mochiAnim];
  if (ad && ai && t - mochiLastT >= ad.speed) {
    mochiLastT = t;
    if (mochiFrame >= ad.frames) {
      if (ad.once && mochiAnimCb) { const cb = mochiAnimCb; mochiAnimCb = null; cb(); }
      mochiFrame = 0;
    }
    mochiFrame++;
  }

  const MOCHI_DRAW = 64; // Draw Mochi bigger than 32px source
  const mf = Math.max(0, Math.min((mochiFrame || 1) - 1, (ANIMS[mochiAnim]?.frames || 1) - 1));
  drawables.push({ y: mochiY + MOCHI_DRAW, draw: () => {
    rctx.save();
    if (mochiFlip) {
      rctx.translate(mochiX + MOCHI_DRAW, mochiY);
      rctx.scale(-1, 1);
      if (ai) rctx.drawImage(ai, mf * S, 0, S, S, 0, 0, MOCHI_DRAW, MOCHI_DRAW);
    } else {
      if (ai) rctx.drawImage(ai, mf * S, 0, S, S, mochiX, mochiY, MOCHI_DRAW, MOCHI_DRAW);
    }
    rctx.restore();
  }});

  drawables.sort((a, b) => a.y - b.y);
  for (const d of drawables) d.draw();

  // Drag preview
  if (dragPreview) {
    rctx.globalAlpha = 0.5;
    drawItem(rctx, dragPreview, dragPreview.x - (dragPreview.dw||16)/2, dragPreview.y - (dragPreview.dh||16)/2);
    rctx.globalAlpha = 1;
  }

  requestAnimationFrame(render);
}

// ═══════ ROOM PICKER ═══════
function setupRoomPicker() {
  const picker = document.getElementById('room-picker');
  for (let i = 1; i <= ROOM_COUNT; i++) {
    const c = document.createElement('canvas');
    c.width = 48; c.height = 48;
    c.className = 'room-thumb' + (i === currentRoom ? ' active' : '');
    c.title = 'Room ' + i;
    const num = i;
    const img = new Image();
    img.onload = () => {
      const tc = c.getContext('2d');
      tc.imageSmoothingEnabled = false;
      tc.drawImage(img, 0, 0, 512, 512, 0, 0, 48, 48);
      roomImgs[num] = img;
    };
    img.src = ROOM_BASE + i + '.png';
    c.onclick = () => loadRoom(num);
    picker.appendChild(c);
  }
}

// ═══════ PALETTE ═══════
function setupPalette() {
  const palette = document.getElementById('palette');

  // Group by category, preserving order
  const catOrder = [];
  const catItems = {};
  for (const item of CATALOG) {
    if (!catItems[item.cat]) { catOrder.push(item.cat); catItems[item.cat] = []; }
    catItems[item.cat].push(item);
  }

  for (const cat of catOrder) {
    const label = document.createElement('div');
    label.className = 'pal-cat open';
    label.textContent = cat;
    palette.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'pal-grid';

    label.onclick = () => {
      label.classList.toggle('open');
      grid.classList.toggle('hidden');
    };

    for (const item of catItems[cat]) {
      const el = document.createElement('div');
      el.className = 'pal-item';
      el.title = item.name;

      const thumb = document.createElement('canvas');
      thumb.width = 56; thumb.height = 56;
      el.appendChild(thumb);

      const lbl = document.createElement('div');
      lbl.className = 'pal-item-label';
      lbl.textContent = item.name;
      el.appendChild(lbl);

      // Draw thumbnail
      const tryDraw = () => {
        const img = itemImgs[item.src];
        if (!img) return false;
        const tc = thumb.getContext('2d');
        tc.imageSmoothingEnabled = false;
        tc.clearRect(0, 0, 56, 56);
        const sx = item.cropX || 0, sy = item.cropY || 0;
        const sw = item.cropW || item.w, sh = item.cropH || item.h;
        const scale = Math.min(52 / sw, 52 / sh);
        const dw = sw * scale, dh = sh * scale;
        tc.drawImage(img, sx, sy, sw, sh, (56-dw)/2, (56-dh)/2, dw, dh);
        return true;
      };
      if (!tryDraw()) {
        const iv = setInterval(() => { if (tryDraw()) clearInterval(iv); }, 100);
      }

      el.addEventListener('mousedown', (e) => {
        if (mode !== 'edit') return;
        e.preventDefault();
        const dims = getItemDims(item);
        startDrag({ id: item.id, dw: dims.w, dh: dims.h }, e);
      });

      grid.appendChild(el);
    }
    palette.appendChild(grid);
  }
}

// ═══════ DRAG & DROP ═══════
let dragging = null;
let dragExistingIdx = -1;

function canvasCoords(e) {
  const rect = roomCanvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (512 / rect.width);
  const y = (e.clientY - rect.top) * (512 / rect.height);
  return { x, y, inside: x >= 0 && x <= 512 && y >= 0 && y <= 512 };
}

function startDrag(itemData, e) {
  dragging = { ...itemData, fromPalette: true };
  dragExistingIdx = -1;
  e.preventDefault();
}

document.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const pos = canvasCoords(e);
  if (pos.inside) {
    dragPreview = { ...dragging, x: pos.x, y: pos.y };
  } else {
    dragPreview = null;
  }
});

document.addEventListener('mouseup', (e) => {
  if (!dragging) return;
  const pos = canvasCoords(e);

  if (pos.inside) {
    const dw = dragging.dw || 32, dh = dragging.dh || 32;
    const px = Math.round(pos.x - dw / 2);
    const py = Math.round(pos.y - dh / 2);

    if (dragExistingIdx >= 0) {
      const items = getPlacedItems();
      items[dragExistingIdx].x = px;
      items[dragExistingIdx].y = py;
    } else {
      const items = getPlacedItems();
      items.push({ id: dragging.id, x: px, y: py });
      roomLayouts[currentRoom] = items;
    }
    saveRoomLayout();
  }

  dragging = null;
  dragPreview = null;
  dragExistingIdx = -1;
});

// ═══════ ROOM CANVAS INTERACTION ═══════
roomCanvas.addEventListener('click', (e) => {
  const pos = canvasCoords(e);
  if (!pos.inside) return;

  if (mode === 'edit') {
    return; // Edit clicks handled by mousedown for dragging
  } else if (mode === 'play') {
    const items = getPlacedItems();
    for (let i = items.length - 1; i >= 0; i--) {
      const item = items[i];
      const def = CATALOG.find(f => f.id === item.id);
      const dims = getItemDims(item);
      if (pos.x >= item.x && pos.x <= item.x + dims.w && pos.y >= item.y && pos.y <= item.y + dims.h) {
        const tx = item.x + dims.w/2 - S/2, ty = item.y + dims.h - S;
        const interact = def?.interact || 'play';

        // Bowl: click to refill if empty, otherwise Mochi goes to eat
        if (isBowlItem(item.id)) {
          const states = getBowlStates();
          const key = '' + i;
          const fullness = states[key] !== undefined ? states[key] : 1;
          if (fullness <= 0) {
            // Refill the bowl
            states[key] = 1;
            saveBowlStates(states);
            return;
          }
          // Mochi walks over and eats
          mochiMoveTo(tx, ty, () => {
            const st = getBowlStates();
            const f = st[key] !== undefined ? st[key] : 1;
            if (f > 0) {
              mochiPlay('eating', () => {
                st[key] = Math.max(0, f - 0.34);
                saveBowlStates(st);
                mochiPlay('idle');
              });
            } else {
              mochiPlay('waiting', () => mochiPlay('idle'));
            }
          });
          return;
        }

        mochiMoveTo(tx, ty, () => {
          if (interact === 'sleep') mochiPlay('laydown', () => mochiPlay('sleep'));
          else if (interact === 'eat') mochiPlay('eating', () => mochiPlay('idle'));
          else mochiPlay('excited', () => mochiPlay('dance'));
        });
        return;
      }
    }
    mochiMoveTo(pos.x - S/2, pos.y - S, null);
  }
});

// Mousedown for dragging existing placed items in edit mode
roomCanvas.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return; // Only left click for dragging
  if (mode !== 'edit') return;
  const pos = canvasCoords(e);
  if (!pos.inside) return;
  const items = getPlacedItems();
  for (let i = items.length - 1; i >= 0; i--) {
    const item = items[i];
    const dims = getItemDims(item);
    if (pos.x >= item.x && pos.x <= item.x + dims.w && pos.y >= item.y && pos.y <= item.y + dims.h) {
      dragging = { id: item.id, dw: dims.w, dh: dims.h, fromPalette: false };
      dragExistingIdx = i;
      dragPreview = { ...dragging, x: pos.x, y: pos.y };
      e.preventDefault();
      return;
    }
  }
});

roomCanvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  if (mode !== 'edit') return;
  const pos = canvasCoords(e);
  const items = getPlacedItems();
  for (let i = items.length - 1; i >= 0; i--) {
    const dims = getItemDims(items[i]);
    if (pos.x >= items[i].x && pos.x <= items[i].x + dims.w && pos.y >= items[i].y && pos.y <= items[i].y + dims.h) {
      items.splice(i, 1);
      saveRoomLayout();
      return;
    }
  }
});

// ═══════ MODE TOGGLE ═══════
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.onclick = () => {
    mode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    document.getElementById('hint').textContent = mode === 'edit'
      ? 'Drag items from palette · Right-click placed items to remove'
      : 'Click furniture for Mochi to interact · Click bowls to refill';
    roomCanvas.style.cursor = mode === 'edit' ? 'crosshair' : 'pointer';
    if (mode === 'play') startAutoWander();
    else stopAutoWander();
  };
});

// ═══════ INIT ═══════
setupRoomPicker();
setupPalette();
loadRoom(currentRoom);
loadMochiPos();
mochiPlay('idle');
requestAnimationFrame(render);
</script>
</body>
</html>
