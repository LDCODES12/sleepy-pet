<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mochi's Room Editor</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Courier New", monospace;
      background: #f2e3bf;
      color: #4b3528;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ── Room picker row ── */
    .room-picker {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      background: #f7e5bd;
      border-bottom: 2px solid #8f6d4d;
      overflow-x: auto;
      flex-shrink: 0;
      align-items: center;
      box-shadow: inset 0 -3px 0 #fff2cf;
    }
    .room-picker::-webkit-scrollbar { height: 7px; }
    .room-picker::-webkit-scrollbar-thumb { background: #b08a64; border-radius: 0; }
    .room-picker-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8f6d4d;
      margin-right: 4px;
      flex-shrink: 0;
      font-weight: 900;
    }
    .room-thumb {
      width: 48px; height: 48px;
      border-radius: 8px;
      border: 1px solid #b99f77;
      background: #f2e2bc;
      cursor: pointer;
      image-rendering: pixelated;
      flex-shrink: 0;
      transition: border-color 0.15s, transform 0.12s, background-color 0.15s;
    }
    .room-thumb:hover {
      border-color: #8f6d4d;
      transform: translateY(-1px);
      background: #fff2cf;
    }
    .room-thumb.active {
      border-color: #8a73d9;
      box-shadow: 0 0 0 2px #dfd4fa;
      background: #fdf5df;
    }

    /* ── Main area ── */
    .main-area {
      display: flex;
      flex: 1;
      min-height: 0;
      background: #ead7af;
    }

    /* ── Palette sidebar ── */
    .palette {
      width: 240px;
      background: #f7e5bd;
      border-right: 2px solid #8f6d4d;
      overflow-y: auto;
      flex-shrink: 0;
      padding: 8px 10px 10px;
      box-shadow: inset -3px 0 0 #fff2cf;
    }
    .palette::-webkit-scrollbar { width: 6px; }
    .palette::-webkit-scrollbar-thumb { background: #b08a64; border-radius: 0; }
    .pal-cat {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8f6d4d;
      margin: 12px 0 6px;
      cursor: pointer;
      font-weight: 900;
      user-select: none;
    }
    .pal-cat:first-child { margin-top: 4px; }
    .pal-cat::before { content: '▸ '; font-size: 8px; }
    .pal-cat.open::before { content: '▾ '; }
    .pal-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .pal-grid.hidden { display: none; }
    .pal-item {
      min-height: 74px;
      background: #f2e2bc;
      border: 1px solid #c2ae86;
      border-radius: 8px;
      cursor: grab;
      display: grid;
      grid-template-rows: 58px 10px;
      align-items: center;
      justify-items: center;
      padding: 3px 3px 2px;
      transition: background 0.15s, border-color 0.15s, transform 0.12s;
      position: relative;
    }
    .pal-item:hover {
      background: #fff2cf;
      border-color: #8f6d4d;
      transform: translateY(-1px);
    }
    .pal-item:active { cursor: grabbing; }
    .pal-item canvas {
      width: 58px;
      height: 58px;
      image-rendering: pixelated;
      flex: 0 0 auto;
      margin-top: 0;
    }
    .pal-item-label {
      position: static;
      font-size: 7px;
      text-align: center;
      color: #8f6d4d;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      width: 100%;
      padding: 0 2px;
      font-weight: 900;
      text-shadow: 0 1px 0 rgba(255, 242, 207, 0.7);
      line-height: 1;
    }

    /* ── Room canvas area ── */
    .room-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      position: relative;
      background: #ead7af;
    }
    #room-canvas {
      image-rendering: pixelated;
      border-radius: 10px;
      border: 2px solid #5c4634;
      box-shadow:
        0 0 0 2px #8f6d4d,
        0 0 0 4px #fff2cf,
        4px 5px 0 rgba(45, 37, 36, 0.45);
      cursor: crosshair;
      max-width: 100%;
      max-height: 100%;
    }

    /* ── Bottom bar ── */
    .bottom-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: #f7e5bd;
      border-top: 2px solid #8f6d4d;
      box-shadow: inset 0 2px 0 #fff2cf;
      flex-shrink: 0;
    }
    .mode-toggle { display: flex; gap: 4px; }
    .mode-btn {
      min-width: 66px;
      height: 26px;
      padding: 0 12px 2px;
      border: 0;
      border-radius: 0;
      background: #f7e5bd;
      color: #4b3528;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.2px;
      cursor: pointer;
      box-shadow:
        0 0 0 1px #2d2524,
        0 0 0 2px #5c4634,
        inset 0 0 0 3px #8f6d4d,
        inset 0 0 0 5px #fff2cf,
        2px 2px 0 #2d2524;
      transition: transform 90ms ease, background-color 90ms ease, box-shadow 90ms ease;
    }
    .mode-btn:hover {
      background: #fff2cf;
      transform: translateY(-1px);
      box-shadow:
        0 0 0 1px #2d2524,
        0 0 0 2px #5c4634,
        inset 0 0 0 3px #8f6d4d,
        inset 0 0 0 5px #fff7df,
        2px 3px 0 #2d2524;
    }
    .mode-btn:active {
      background: #d6c08b;
      transform: translate(1px, 1px);
      box-shadow:
        0 0 0 1px #2d2524,
        0 0 0 2px #5c4634,
        inset 0 0 0 3px #5c4634,
        inset 0 0 0 5px #d2b27e,
        1px 1px 0 #2d2524;
    }
    .mode-btn.active {
      background: #dfd4fa;
      color: #41305e;
      box-shadow:
        0 0 0 1px #4f3d79,
        0 0 0 2px #8a73d9,
        inset 0 0 0 3px #b9a8ef,
        inset 0 0 0 5px #efe8ff,
        2px 2px 0 #4f3d79;
    }
    .hint {
      font-size: 9px;
      color: #8f6d4d;
      transition: color 0.15s;
      font-weight: 900;
      letter-spacing: 0.4px;
      text-align: right;
    }
    .hint.warn { color: #b24f45; }

    /* ── Drag ghost ── */
    .drag-ghost {
      position: fixed; pointer-events: none; z-index: 999;
      image-rendering: pixelated; opacity: 0.75;
    }

    /* ── Group mode ── */
    body.group-mode .room-picker,
    body.group-mode .palette { display: none !important; }
    body.group-mode .mode-btn[data-mode="edit"] { display: none !important; }
    body.group-mode .main-area { justify-content: center; }
    body.group-mode .room-area { position: relative; }
    .group-title {
      position: absolute;
      top: 8px; left: 12px;
      font-weight: 900;
      font-size: 12px;
      color: #4b3528;
      background: #fff7df;
      padding: 4px 8px;
      box-shadow: 0 0 0 1px #8f6d4d, 1px 1px 0 #8f6d4d;
      letter-spacing: 0.5px;
      display: none;
    }
    body.group-mode .group-title { display: block; }
    .group-chat {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      display: none;
      flex-direction: column;
      gap: 6px;
      max-width: 420px;
      z-index: 5;
    }
    body.group-mode .group-chat { display: flex; }
    .group-chat-log {
      max-height: 120px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 3px;
      background: rgba(255,247,223,0.92);
      padding: 6px 8px;
      font-size: 10px;
      font-weight: 900;
      color: #4b3528;
      box-shadow: 0 0 0 1px #8f6d4d;
    }
    .group-chat-log::-webkit-scrollbar { width: 6px; }
    .group-chat-log::-webkit-scrollbar-thumb { background: #c2ae86; border-radius: 3px; }
    .group-chat-log .g-line { line-height: 1.3; }
    .group-chat-log .g-line b { color: #8a73d9; margin-right: 4px; }
    .group-chat-input-row {
      display: grid;
      grid-template-columns: 1fr 56px;
      gap: 6px;
    }
    .group-chat-input-row input {
      border: 0; border-radius: 0;
      background: #fff7df;
      color: #4b3528;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Courier New", monospace;
      font-size: 11px;
      font-weight: 900;
      padding: 6px 8px;
      outline: none;
      box-shadow: 0 0 0 1px #8f6d4d, inset 0 -2px 0 #d6c08b;
    }
    .group-chat-input-row button {
      height: 28px;
      border: 0; border-radius: 0;
      cursor: pointer;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Courier New", monospace;
      font-size: 11px; font-weight: 900;
      color: #4b3528;
      background: #ffd96b;
      box-shadow: 0 0 0 1px #2d2524, inset 0 0 0 3px #fff2a1, 1px 1px 0 #8f6d4d;
    }
    .group-chat-input-row button:hover { background: #fff2cf; transform: translateY(-1px); }
    .group-chat-input-row button:active { transform: translate(1px, 1px); }
  </style>
</head>

function getCatalogItem(id) {
  return CATALOG.find(item => item.id === id);
}

function getPlacementSurface(id) {
  const def = getCatalogItem(id);
  if (!def) return 'floor';
  if (WALL_PLACEMENT_CATEGORIES.has(def.cat)) return 'wall';
  return 'floor';
}

function getFloorFootprintRule(id) {
  const def = getCatalogItem(id);
  const categoryRule = def ? FLOOR_FOOTPRINT_BY_CATEGORY[def.cat] : null;
  const idRule = FLOOR_FOOTPRINT_BY_ID[id] || null;
  if (id?.startsWith('bowl-') || id?.startsWith('fish-')) {
    return { ...DEFAULT_FLOOR_FOOTPRINT, kind: 'visible', inset: 1, layer: 'flat' };
  }
  return { ...DEFAULT_FLOOR_FOOTPRINT, ...categoryRule, ...idRule };
}

function isFlatFloorItem(id) {
  return getFloorFootprintRule(id).layer === 'flat' || getFloorFootprintRule(id).layer === 'underlay';
}

function isUnderlayFloorItem(id) {
  return getFloorFootprintRule(id).layer === 'underlay';
}

function getRowsBounds(rows) {
  if (!rows.length) return null;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const row of rows) {
    minX = Math.min(minX, row.minX);
    maxX = Math.max(maxX, row.maxX);
    minY = Math.min(minY, row.y);
    maxY = Math.max(maxY, row.y);
  }
  return { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 };
}

function getRowsFromRect(rect) {
  const rows = [];
  const startY = Math.ceil(rect.y);
  const endY = Math.floor(rect.y + rect.h - 1);
  for (let y = startY; y <= endY; y++) {
    rows.push({ y, minX: rect.x, maxX: rect.x + rect.w - 1 });
  }
  return rows;
}

function insetRows(rows, inset = 0) {
  if (!inset) return rows;
  return rows
    .map((row) => ({ y: row.y, minX: row.minX + inset, maxX: row.maxX - inset }))
    .filter((row) => row.maxX >= row.minX);
}

function getLocalFootprintRows(shape, rule) {
  if (rule.kind === 'rows') {
    return rule.rows.map((row) => ({ y: row.y, minX: row.minX, maxX: row.maxX }));
  }

  if (rule.kind === 'visible') {
    const rows = [];
    for (let y = shape.visible.y; y < shape.visible.y + shape.visible.h; y++) {
      const row = shape.rows[y];
      if (row) rows.push({ y, minX: row.minX, maxX: row.maxX });
    }
    return insetRows(rows, rule.inset || 0);
  }

  if (rule.kind === 'rect') {
    return getRowsFromRect({
      x: rule.x,
      y: rule.y,
      w: rule.w,
      h: rule.h,
    });
  }

  const contactHeight = Math.max(1, Math.min(rule.contactHeight || DEFAULT_FLOOR_FOOTPRINT.contactHeight, shape.visible.h));
  const startY = shape.visible.y + shape.visible.h - contactHeight;
  const endY = shape.visible.y + shape.visible.h - 1;
  const rows = [];
  for (let y = startY; y <= endY; y++) {
    const row = shape.rows[y];
    if (row) rows.push({ y, minX: row.minX, maxX: row.maxX });
  }
  return insetRows(rows, rule.inset || 0);
}

function getFallbackFootprintRows(rule, dims) {
  if (rule.kind === 'rows') {
    return rule.rows.map((row) => ({ y: row.y, minX: row.minX, maxX: row.maxX }));
  }

  if (rule.kind === 'visible') {
    return getRowsFromRect({ x: 0, y: 0, w: dims.w, h: dims.h });
  }

  if (rule.kind === 'rect') {
    return getRowsFromRect({
      x: rule.x,
      y: rule.y,
      w: rule.w,
      h: rule.h,
    });
  }

  const width = Math.max(rule.minWidth || 12, dims.w * (rule.fallbackWidth || DEFAULT_FLOOR_FOOTPRINT.fallbackWidth));
  const height = rule.contactHeight || Math.max(1, dims.h * (rule.fallbackHeight || DEFAULT_FLOOR_FOOTPRINT.fallbackHeight));
  return getRowsFromRect({
    x: (dims.w - width) / 2,
    y: dims.h - height - (rule.fallbackBottom ?? DEFAULT_FLOOR_FOOTPRINT.fallbackBottom),
    w: width,
    h: height,
  });
}

function toWorldFootprint(localRows, x, y, layer = 'solid', scale = 1, flipWidth = null) {
  const rows = [];
  for (const row of localRows) {
    const minX = flipWidth === null ? row.minX : flipWidth - row.maxX - 1;
    const maxX = flipWidth === null ? row.maxX : flipWidth - row.minX - 1;
    const startY = Math.round(y + row.y * scale);
    const repeat = Math.max(1, Math.round(scale));
    for (let i = 0; i < repeat; i++) {
      rows.push({
        y: startY + i,
        minX: x + minX * scale,
        maxX: x + (maxX + 1) * scale - 1,
      });
    }
  }
  return { layer, rows, rect: getRowsBounds(rows) || { x, y, w: 1, h: 1 } };
}

const OPAQUE_ALPHA_THRESHOLD = 20;
const itemShapeCache = new Map();
const mochiShapeCache = new Map();

function getSourceDims(def) {
  return {
    w: def?.cropW || def?.w || 32,
    h: def?.cropH || def?.h || 32,
  };
}

function makeFallbackShape(def) {
  const dims = getSourceDims(def);
  const rows = Array.from({ length: dims.h }, () => null);
  for (let y = 0; y < dims.h; y++) rows[y] = { minX: 0, maxX: dims.w - 1 };
  return {
    ready: false,
    sourceW: dims.w,
    sourceH: dims.h,
    visible: { x: 0, y: 0, w: dims.w, h: dims.h },
    rows,
  };
}

function getSpriteShape(id) {
  const def = getCatalogItem(id);
  if (!def) return makeFallbackShape(null);

  const fallback = makeFallbackShape(def);
  const img = itemImgs[def.src];
  if (!img) return fallback;
  if (itemShapeCache.has(id)) return itemShapeCache.get(id);

  const source = getSourceDims(def);
  const canvas = document.createElement('canvas');
  canvas.width = source.w;
  canvas.height = source.h;
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  ctx.clearRect(0, 0, source.w, source.h);
  ctx.drawImage(img, def.cropX || 0, def.cropY || 0, source.w, source.h, 0, 0, source.w, source.h);

  const data = ctx.getImageData(0, 0, source.w, source.h).data;
  const rows = Array.from({ length: source.h }, () => null);
  let minX = source.w, minY = source.h, maxX = -1, maxY = -1;

  for (let y = 0; y < source.h; y++) {
    let rowMin = source.w, rowMax = -1;
    for (let x = 0; x < source.w; x++) {
      const alpha = data[(y * source.w + x) * 4 + 3];
      if (alpha <= OPAQUE_ALPHA_THRESHOLD) continue;
      rowMin = Math.min(rowMin, x);
      rowMax = Math.max(rowMax, x);
      minX = Math.min(minX, x);
      maxX = Math.max(maxX, x);
      minY = Math.min(minY, y);
      maxY = Math.max(maxY, y);
    }
    if (rowMax >= 0) rows[y] = { minX: rowMin, maxX: rowMax };
  }

  const shape = maxX >= 0
    ? {
        ready: true,
        sourceW: source.w,
        sourceH: source.h,
        visible: { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 },
        rows,
      }
    : fallback;

  itemShapeCache.set(id, shape);
  return shape;
}

function getLocalRectFromBounds(bounds, inset = 0) {
  const safeInsetX = Math.min(inset, bounds.w / 2);
  const safeInsetY = Math.min(inset, bounds.h / 2);
  return {
    x: bounds.x + safeInsetX,
    y: bounds.y + safeInsetY,
    w: Math.max(1, bounds.w - safeInsetX * 2),
    h: Math.max(1, bounds.h - safeInsetY * 2),
  };
}

function getLocalBottomBand(shape, ratio, minHeight = 6, maxHeight = 32) {
  const bandHeight = Math.max(minHeight, Math.min(maxHeight, Math.ceil(shape.visible.h * ratio), shape.visible.h));
  const startY = shape.visible.y + shape.visible.h - bandHeight;
  const endY = shape.visible.y + shape.visible.h - 1;
  let minX = shape.sourceW, minY = shape.sourceH, maxX = -1, maxY = -1;

  for (let y = startY; y <= endY; y++) {
    const row = shape.rows[y];
    if (!row) continue;
    minX = Math.min(minX, row.minX);
    maxX = Math.max(maxX, row.maxX);
    minY = Math.min(minY, y);
    maxY = Math.max(maxY, y);
  }

  if (maxX < 0) return getLocalRectFromBounds(shape.visible);
  return { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 };
}

function toWorldRect(localRect, x, y, inset = 0) {
  const rect = getLocalRectFromBounds(localRect, inset);
  return {
    x: x + rect.x,
    y: y + rect.y,
    w: rect.w,
    h: rect.h,
  };
}

function scanCanvasShape(canvas) {
  const sourceW = canvas.width;
  const sourceH = canvas.height;
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const data = ctx.getImageData(0, 0, sourceW, sourceH).data;
  const rows = Array.from({ length: sourceH }, () => null);
  let minX = sourceW, minY = sourceH, maxX = -1, maxY = -1;

  for (let y = 0; y < sourceH; y++) {
    let rowMin = sourceW, rowMax = -1;
    for (let x = 0; x < sourceW; x++) {
      const alpha = data[(y * sourceW + x) * 4 + 3];
      if (alpha <= OPAQUE_ALPHA_THRESHOLD) continue;
      rowMin = Math.min(rowMin, x);
      rowMax = Math.max(rowMax, x);
      minX = Math.min(minX, x);
      maxX = Math.max(maxX, x);
      minY = Math.min(minY, y);
      maxY = Math.max(maxY, y);
    }
    if (rowMax >= 0) rows[y] = { minX: rowMin, maxX: rowMax };
  }

  if (maxX < 0) return null;
  return {
    ready: true,
    sourceW,
    sourceH,
    visible: { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 },
    rows,
  };
}

function getMochiFrameShape() {
  if (
    typeof mochiImgs === 'undefined'
    || typeof mochiAnim === 'undefined'
    || typeof mochiFrame === 'undefined'
  ) return null;

  const anim = ANIMS[mochiAnim];
  const img = mochiImgs[mochiAnim];
  if (!anim || !img) return null;

  const frame = Math.max(0, Math.min((mochiFrame || 1) - 1, anim.frames - 1));
  const key = mochiAnim + ':' + frame;
  if (mochiShapeCache.has(key)) return mochiShapeCache.get(key);

  const canvas = document.createElement('canvas');
  canvas.width = S;
  canvas.height = S;
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  ctx.clearRect(0, 0, S, S);
  ctx.drawImage(img, frame * S, 0, S, S, 0, 0, S, S);

  const shape = scanCanvasShape(canvas);
  if (shape) mochiShapeCache.set(key, shape);
  return shape;
}

function getMochiFootprint() {
  return getMochiFootprintAt(mochiX, mochiY, mochiFlip);
}

function getMochiFootprintAt(x, y, flip = false) {
  if (typeof x !== 'number' || typeof y !== 'number') return null;
  return toWorldFootprint(MOCHI_BASE_FOOTPRINT_ROWS, Math.round(x), Math.round(y), 'solid', 1, flip ? MOCHI_DRAW_SIZE : null);
}

function getMochiCollisionRect() {
  return getMochiFootprint()?.rect || null;
}

function getCollisionRect(id, x, y, dims) {
  return getCollisionFootprint(id, x, y, dims).rect;
}

function getCollisionFootprint(id, x, y, dims) {
  const surface = getPlacementSurface(id);
  const shape = getSpriteShape(id);
  if (surface === 'wall') {
    const rect = shape.ready
      ? toWorldRect(shape.visible, x, y, 2)
      : {
        x: x + 3,
        y: y + 3,
        w: Math.max(1, dims.w - 6),
        h: Math.max(1, dims.h - 6),
      };
    return { layer: 'wall', rows: getRowsFromRect(rect), rect };
  }

  return getFloorSupportFootprint(id, x, y, dims);
}

function getPreviewCollisionRect(id, x, y, dims) {
  return getCollisionRect(id, x, y, dims);
}

function getPreviewFootprint(id, x, y, dims) {
  return getCollisionFootprint(id, x, y, dims);
}

function getFloorSupportRect(id, x, y, dims) {
  return getFloorSupportFootprint(id, x, y, dims).rect;
}

function getFloorSupportFootprint(id, x, y, dims) {
  const rule = getFloorFootprintRule(id);
  const shape = getSpriteShape(id);
  const localRows = shape.ready
    ? getLocalFootprintRows(shape, rule)
    : getFallbackFootprintRows(rule, dims);
  return toWorldFootprint(localRows, x, y, rule.layer || 'solid');
}

function getVisibleFootprint(id, x, y, dims) {
  const shape = getSpriteShape(id);
  if (!shape.ready) {
    return toWorldFootprint(getRowsFromRect({ x: 0, y: 0, w: dims.w, h: dims.h }), x, y, 'visible');
  }

  const rows = [];
  for (let y = shape.visible.y; y < shape.visible.y + shape.visible.h; y++) {
    const row = shape.rows[y];
    if (row) rows.push({ y, minX: row.minX, maxX: row.maxX });
  }
  return toWorldFootprint(rows, x, y, 'visible');
}

function rectsOverlap(a, b, tolerance = 2) {
  const overlapX = Math.min(a.x + a.w, b.x + b.w) - Math.max(a.x, b.x);
  const overlapY = Math.min(a.y + a.h, b.y + b.h) - Math.max(a.y, b.y);
  return overlapX > tolerance && overlapY > tolerance;
}

function footprintsOverlap(a, b, tolerance = 2) {
  if (!rectsOverlap(a.rect, b.rect, tolerance)) return false;

  const bRowsByY = new Map();
  for (const row of b.rows) {
    const y = Math.round(row.y);
    const rows = bRowsByY.get(y) || [];
    rows.push(row);
    bRowsByY.set(y, rows);
  }

  for (const aRow of a.rows) {
    const matchingRows = bRowsByY.get(Math.round(aRow.y));
    if (!matchingRows) continue;
    for (const bRow of matchingRows) {
      const overlapX = Math.min(aRow.maxX, bRow.maxX) - Math.max(aRow.minX, bRow.minX) + 1;
      if (overlapX > tolerance) return true;
    }
  }

  return false;
}

function getRectPoints(rect, inset = 2) {
  const left = rect.x + Math.min(inset, rect.w / 2);
  const right = rect.x + rect.w - Math.min(inset, rect.w / 2);
  const top = rect.y + Math.min(inset, rect.h / 2);
  const bottom = rect.y + rect.h - Math.min(inset, rect.h / 2);
  const centerX = rect.x + rect.w / 2;
  const centerY = rect.y + rect.h / 2;
  return [
    { x: left, y: top },
    { x: right, y: top },
    { x: left, y: bottom },
    { x: right, y: bottom },
    { x: centerX, y: centerY },
  ];
}

function footprintIsOnFloor(footprint) {
  if (!footprint?.rows?.length) return false;
  return footprintFitsPolygon(footprint, ROOM_ZONES.floor);
}

function footprintFitsPolygon(footprint, polygon) {
  if (!footprint?.rows?.length) return false;
  for (const row of footprint.rows) {
    const points = [
      { x: row.minX, y: row.y },
      { x: row.maxX, y: row.y },
      { x: (row.minX + row.maxX) / 2, y: row.y },
    ];
    if (!points.every((point) => pointInPolygon(point, polygon))) return false;
  }
  return true;
}

function visibleShapeFitsRoom(id, x, y, dims) {
  return footprintFitsPolygon(getVisibleFootprint(id, x, y, dims), ROOM_ZONES.roomShell);
}

function visibleShapeFitsWall(id, x, y, dims, wall) {
  const shape = getSpriteShape(id);
  if (!shape.ready) {
    const def = getCatalogItem(id);
    const points = getPlacementPoints(id, x, y, dims);
    if (def?.cat !== 'Windows') {
      return getRectPoints({ x, y, w: dims.w, h: dims.h }).every((point) => pointInPolygon(point, wall));
    }
    return (
      pointInPolygon(points.topCenter, wall)
      && pointInPolygon(points.center, wall)
      && pointInPolygon(points.bottomCenter, wall)
    );
  }

  return footprintFitsPolygon(getVisibleFootprint(id, x, y, dims), wall);
}

function validateItemCollision(id, x, y, dims, ignoreIndex = -1) {
  const surface = getPlacementSurface(id);
  const def = getCatalogItem(id);
  const name = def?.name || 'Item';
  const candidateFootprint = getCollisionFootprint(id, x, y, dims);
  const placedItems = typeof getPlacedItems === 'function' ? getPlacedItems() : [];

  for (let i = 0; i < placedItems.length; i++) {
    if (i === ignoreIndex) continue;
    const other = placedItems[i];
    const otherDef = getCatalogItem(other.id);
    const otherSurface = getPlacementSurface(other.id);
    const otherDims = getItemDims(other);
    if (otherSurface !== surface) continue;
    if (isUnderlayFloorItem(id) !== isUnderlayFloorItem(other.id)) continue;

    const otherFootprint = getCollisionFootprint(other.id, other.x, other.y, otherDims);
    if (!footprintsOverlap(candidateFootprint, otherFootprint)) continue;

    const otherName = otherDef?.name || 'another item';
    const reason = surface === 'wall' ? 'Wall items cannot overlap.' : 'Their bases overlap.';
    return { valid: false, surface, message: `Move ${name} away from ${otherName}. ${reason}` };
  }

  return { valid: true, surface, message: `${name} has room here.` };
}

function validateMochiCollision(id, x, y, dims) {
  const surface = getPlacementSurface(id);
  const def = getCatalogItem(id);
  const name = def?.name || 'Item';
  if (surface !== 'floor') return { valid: true, surface, message: `${name} has room here.` };

  const mochiFootprint = getMochiFootprint();
  if (!mochiFootprint) return { valid: true, surface, message: `${name} has room here.` };

  const itemFootprint = getCollisionFootprint(id, x, y, dims);
  if (!footprintsOverlap(itemFootprint, mochiFootprint)) {
    return { valid: true, surface, message: `${name} has room here.` };
  }

  return {
    valid: false,
    surface,
    message: `Move ${name} away from Mochi. Mochi is standing there.`,
  };
}

function pointOnSegment(point, a, b) {
  const cross = (point.y - a.y) * (b.x - a.x) - (point.x - a.x) * (b.y - a.y);
  if (Math.abs(cross) > 0.01) return false;
  const dot = (point.x - a.x) * (b.x - a.x) + (point.y - a.y) * (b.y - a.y);
  if (dot < 0) return false;
  const lenSq = (b.x - a.x) ** 2 + (b.y - a.y) ** 2;
  return dot <= lenSq;
}

function pointInPolygon(point, polygon) {
  let inside = false;
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const a = polygon[i], b = polygon[j];
    if (pointOnSegment(point, a, b)) return true;
    const intersects = (a.y > point.y) !== (b.y > point.y)
      && point.x < ((b.x - a.x) * (point.y - a.y)) / (b.y - a.y) + a.x;
    if (intersects) inside = !inside;
  }
  return inside;
}

function getWallSide(point) {
  if (pointInPolygon(point, ROOM_ZONES.leftWall)) return 'leftWall';
  if (pointInPolygon(point, ROOM_ZONES.rightWall)) return 'rightWall';
  return null;
}

function getPlacementPoints(id, x, y, dims) {
  const centerX = x + dims.w / 2;
  const centerY = y + dims.h / 2;
  return {
    center: { x: centerX, y: centerY },
    topCenter: { x: centerX, y: y + 2 },
    bottomCenter: { x: centerX, y: y + dims.h - 2 },
    leftFoot: { x: x + dims.w * 0.28, y: y + dims.h - 2 },
    rightFoot: { x: x + dims.w * 0.72, y: y + dims.h - 2 },
    floorCenter: { x: centerX, y: y + dims.h * 0.55 },
    topLeft: { x: x + 2, y: y + 2 },
    topRight: { x: x + dims.w - 2, y: y + 2 },
    bottomLeft: { x: x + 2, y: y + dims.h - 2 },
    bottomRight: { x: x + dims.w - 2, y: y + dims.h - 2 },
  };
}

function validatePlacement(id, x, y, dims, options = {}) {
  const surface = getPlacementSurface(id);
  const def = getCatalogItem(id);
  const name = def?.name || 'Item';
  const inCanvas = x >= 0 && y >= 0 && x + dims.w <= 512 && y + dims.h <= 512;
  if (!inCanvas) {
    return { valid: false, surface, message: `Keep ${name} inside the room.` };
  }

  const points = getPlacementPoints(id, x, y, dims);
  if (surface === 'wall') {
    const wallSide = getWallSide(points.center);
    const wall = wallSide ? ROOM_ZONES[wallSide] : null;
    const hangsOnWall = wall && visibleShapeFitsWall(id, x, y, dims, wall);
    if (!hangsOnWall) return { valid: false, surface, message: `Put ${name} on the wall.` };
    return validateItemCollision(id, x, y, dims, options.ignoreIndex);
  }

  const floorFootprint = getFloorSupportFootprint(id, x, y, dims);
  const footIsOnFloor = footprintIsOnFloor(floorFootprint);

  if (!footIsOnFloor) {
    return { valid: false, surface, message: `Put ${name} on the floor.` };
  }

  if (!visibleShapeFitsRoom(id, x, y, dims)) {
    return { valid: false, surface, message: `Keep ${name} inside the room.` };
  }

  const mochiPlacement = validateMochiCollision(id, x, y, dims);
  if (!mochiPlacement.valid) return mochiPlacement;

  return validateItemCollision(id, x, y, dims, options.ignoreIndex);
}

function getMochiBlockingFootprints() {
  const blockers = [];
  const placedItems = typeof getPlacedItems === 'function' ? getPlacedItems() : [];
  for (const item of placedItems) {
    if (getPlacementSurface(item.id) !== 'floor') continue;
    if (isUnderlayFloorItem(item.id)) continue;
    blockers.push(getCollisionFootprint(item.id, item.x, item.y, getItemDims(item)));
  }
  return blockers;
}

function inflateFootprint(footprint, amount = 0) {
  const expand = Math.max(0, Math.round(amount));
  if (!expand || !footprint?.rows?.length) return footprint;

  const rowsByY = new Map();
  for (const row of footprint.rows) {
    const y = Math.round(row.y);
    for (let dy = -expand; dy <= expand; dy++) {
      const key = y + dy;
      const existing = rowsByY.get(key);
      const minX = row.minX - expand;
      const maxX = row.maxX + expand;
      rowsByY.set(key, existing
        ? { y: key, minX: Math.min(existing.minX, minX), maxX: Math.max(existing.maxX, maxX) }
        : { y: key, minX, maxX });
    }
  }

  const rows = [...rowsByY.values()].sort((a, b) => a.y - b.y);
  return { ...footprint, rows, rect: getRowsBounds(rows) || footprint.rect };
}

function rectDistance(a, b) {
  const ax2 = a.x + a.w;
  const ay2 = a.y + a.h;
  const bx2 = b.x + b.w;
  const by2 = b.y + b.h;
  const dx = Math.max(b.x - ax2, a.x - bx2, 0);
  const dy = Math.max(b.y - ay2, a.y - by2, 0);
  return Math.hypot(dx, dy);
}

function getMochiClearance(x, y, blockers = getMochiBlockingFootprints()) {
  const footprint = getMochiFootprintAt(x, y, false);
  if (!footprint || !footprintIsOnFloor(footprint)) return -Infinity;
  let clearance = Infinity;
  for (const blocker of blockers) {
    if (footprintsOverlap(footprint, blocker, 1)) return -Infinity;
    clearance = Math.min(clearance, rectDistance(footprint.rect, blocker.rect));
  }
  return clearance === Infinity ? 999 : clearance;
}

function isMochiPositionWalkable(x, y, blockers = getMochiBlockingFootprints(), clearance = 0) {
  if (x < 0 || y < 0 || x + MOCHI_DRAW_SIZE > 512 || y + MOCHI_DRAW_SIZE > 512) return false;
  const footprint = getMochiFootprintAt(x, y, false);
  if (!footprint || !footprintIsOnFloor(footprint)) return false;
  const testFootprint = clearance > 0 ? inflateFootprint(footprint, clearance) : footprint;
  return !blockers.some((blocker) => footprintsOverlap(testFootprint, blocker, 1));
}

function topLeftFromMochiFootCenter(x, y) {
  return {
    x: Math.round(x - MOCHI_FOOT_CENTER.x),
    y: Math.round(y - MOCHI_FOOT_CENTER.y),
  };
}

function findNearestWalkableMochiPosition(x, y, blockers = getMochiBlockingFootprints(), maxRadius = 160, options = {}) {
  if (typeof maxRadius === 'object') {
    options = maxRadius;
    maxRadius = options.maxRadius ?? 160;
  }

  const preferClearance = options.preferClearance || false;
  const targetClearance = options.targetClearance ?? MOCHI_TARGET_CLEARANCE;
  const clearanceWeight = options.clearanceWeight ?? 0.55;
  const minSearchRadius = options.minSearchRadius ?? (preferClearance ? 48 : 0);
  const step = MOCHI_PATH_GRID / 2;
  let best = null;
  let bestScore = Infinity;

  const consider = (candidate) => {
    if (!isMochiPositionWalkable(candidate.x, candidate.y, blockers)) return;
    const dist = Math.hypot(candidate.x - x, candidate.y - y);
    const clearance = getMochiClearance(candidate.x, candidate.y, blockers);
    const clearanceBonus = Math.min(Math.max(clearance, 0), targetClearance) * clearanceWeight;
    const crampedPenalty = preferClearance && clearance < targetClearance
      ? (targetClearance - Math.max(clearance, 0)) * 3
      : 0;
    const score = dist + crampedPenalty - clearanceBonus;
    if (score < bestScore) {
      best = { x: candidate.x, y: candidate.y, clearance };
      bestScore = score;
    }
  };

  consider({ x: Math.round(x), y: Math.round(y) });
  if (best && (!preferClearance || best.clearance >= targetClearance)) {
    return { x: best.x, y: best.y };
  }

  for (let radius = step; radius <= maxRadius; radius += step) {
    for (let dx = -radius; dx <= radius; dx += step) {
      for (const dy of [-radius, radius]) {
        const candidate = { x: Math.round(x + dx), y: Math.round(y + dy) };
        consider(candidate);
      }
    }
    for (let dy = -radius + step; dy <= radius - step; dy += step) {
      for (const dx of [-radius, radius]) {
        const candidate = { x: Math.round(x + dx), y: Math.round(y + dy) };
        consider(candidate);
      }
    }
    if (best && radius >= minSearchRadius && (!preferClearance || best.clearance >= targetClearance)) {
      return { x: best.x, y: best.y };
    }
  }

  return best ? { x: best.x, y: best.y } : null;
}

function lineIsWalkableForMochi(from, to, blockers, clearance = 0) {
  const dist = Math.hypot(to.x - from.x, to.y - from.y);
  const steps = Math.max(1, Math.ceil(dist / (MOCHI_PATH_GRID / 2)));
  for (let i = 1; i <= steps; i++) {
    const t = i / steps;
    const x = from.x + (to.x - from.x) * t;
    const y = from.y + (to.y - from.y) * t;
    if (!isMochiPositionWalkable(x, y, blockers, clearance)) return false;
  }
  return true;
}

function simplifyMochiPath(path, blockers, clearance = 0) {
  if (path.length <= 2) return path;
  const simplified = [path[0]];
  let anchor = 0;

  while (anchor < path.length - 1) {
    let next = path.length - 1;
    while (next > anchor + 1 && !lineIsWalkableForMochi(path[anchor], path[next], blockers, clearance)) next--;
    simplified.push(path[next]);
    anchor = next;
  }

  return simplified;
}

function findMochiPath(startX, startY, endX, endY, blockers = getMochiBlockingFootprints()) {
  const start = findNearestWalkableMochiPosition(startX, startY, blockers, 96);
  const goal = isMochiPositionWalkable(endX, endY, blockers)
    ? { x: Math.round(endX), y: Math.round(endY) }
    : findNearestWalkableMochiPosition(endX, endY, blockers, 180, {
      preferClearance: true,
      targetClearance: MOCHI_TARGET_CLEARANCE,
    });
  if (!start || !goal) return [];
  if (lineIsWalkableForMochi(start, goal, blockers)) return [goal];

  const keyFor = (x, y) => `${x},${y}`;
  const heuristic = (node) => Math.hypot(node.x - goal.x, node.y - goal.y);
  const startNode = {
    x: Math.round(start.x / MOCHI_PATH_GRID) * MOCHI_PATH_GRID,
    y: Math.round(start.y / MOCHI_PATH_GRID) * MOCHI_PATH_GRID,
  };
  const goalNode = {
    x: Math.round(goal.x / MOCHI_PATH_GRID) * MOCHI_PATH_GRID,
    y: Math.round(goal.y / MOCHI_PATH_GRID) * MOCHI_PATH_GRID,
  };
  if (!isMochiPositionWalkable(startNode.x, startNode.y, blockers)) {
    startNode.x = start.x;
    startNode.y = start.y;
  }
  if (!isMochiPositionWalkable(goalNode.x, goalNode.y, blockers)) {
    goalNode.x = goal.x;
    goalNode.y = goal.y;
  }

  const open = [{ ...startNode, g: 0, f: heuristic(startNode), parent: null }];
  const best = new Map([[keyFor(startNode.x, startNode.y), open[0]]]);
  const closed = new Set();
  const dirs = [
    [MOCHI_PATH_GRID, 0, 1],
    [-MOCHI_PATH_GRID, 0, 1],
    [0, MOCHI_PATH_GRID, 1],
    [0, -MOCHI_PATH_GRID, 1],
    [MOCHI_PATH_GRID, MOCHI_PATH_GRID, 1.4],
    [MOCHI_PATH_GRID, -MOCHI_PATH_GRID, 1.4],
    [-MOCHI_PATH_GRID, MOCHI_PATH_GRID, 1.4],
    [-MOCHI_PATH_GRID, -MOCHI_PATH_GRID, 1.4],
  ];
  let visited = 0;

  while (open.length && visited++ < MOCHI_PATH_MAX_NODES) {
    open.sort((a, b) => a.f - b.f);
    const current = open.shift();
    const currentKey = keyFor(current.x, current.y);
    if (closed.has(currentKey)) continue;
    closed.add(currentKey);

    if (Math.hypot(current.x - goalNode.x, current.y - goalNode.y) <= MOCHI_PATH_GRID) {
      const path = [goal];
      let node = current;
      while (node.parent) {
        path.unshift({ x: node.x, y: node.y });
        node = node.parent;
      }
      return simplifyMochiPath(path, blockers);
    }

    for (const [dx, dy, cost] of dirs) {
      const nx = current.x + dx;
      const ny = current.y + dy;
      const key = keyFor(nx, ny);
      if (closed.has(key)) continue;
      if (!isMochiPositionWalkable(nx, ny, blockers)) continue;
      if (dx && dy) {
        if (!isMochiPositionWalkable(current.x + dx, current.y, blockers)) continue;
        if (!isMochiPositionWalkable(current.x, current.y + dy, blockers)) continue;
      }

      const g = current.g + cost;
      const previous = best.get(key);
      if (previous && previous.g <= g) continue;

      const node = { x: nx, y: ny, g, f: g + heuristic({ x: nx, y: ny }), parent: current };
      best.set(key, node);
      open.push(node);
    }
  }

  return [];
}

function findMochiInteractionTarget(item) {
  const dims = getItemDims(item);
  const footprint = getCollisionFootprint(item.id, item.x, item.y, dims);
  const rect = footprint.rect;
  const cx = rect.x + rect.w / 2;
  const cy = rect.y + rect.h / 2;
  const candidates = [
    topLeftFromMochiFootCenter(cx, rect.y + rect.h + 12),
    topLeftFromMochiFootCenter(cx, rect.y - 10),
    topLeftFromMochiFootCenter(rect.x - 12, cy),
    topLeftFromMochiFootCenter(rect.x + rect.w + 12, cy),
    topLeftFromMochiFootCenter(cx - 28, rect.y + rect.h + 10),
    topLeftFromMochiFootCenter(cx + 28, rect.y + rect.h + 10),
  ];
  const blockers = getMochiBlockingFootprints();
  let best = null;
  let bestDist = Infinity;

  for (const candidate of candidates) {
    const safe = findNearestWalkableMochiPosition(candidate.x, candidate.y, blockers, 96, {
      preferClearance: true,
      targetClearance: MOCHI_TARGET_CLEARANCE,
    });
    if (!safe) continue;
    const path = findMochiPath(mochiX, mochiY, safe.x, safe.y, blockers);
    const hopDist = Math.hypot(safe.x - mochiX, safe.y - mochiY);
    if (!path.length && hopDist > MOCHI_MAX_HOP_DISTANCE) continue;
    const clearance = getMochiClearance(safe.x, safe.y, blockers);
    const dist = hopDist - Math.min(clearance, MOCHI_TARGET_CLEARANCE) * 0.5;
    if (dist < bestDist) { best = safe; bestDist = dist; }
  }

  return best || findNearestWalkableMochiPosition(item.x + dims.w / 2 - MOCHI_DRAW_SIZE / 2, item.y + dims.h - MOCHI_DRAW_SIZE, blockers, 180, {
    preferClearance: true,
    targetClearance: MOCHI_TARGET_CLEARANCE,
  });
}

function findRandomWalkableMochiPosition() {
  const blockers = getMochiBlockingFootprints();
  for (let i = 0; i < 80; i++) {
    const point = ROOM_ZONES.floor[Math.floor(Math.random() * ROOM_ZONES.floor.length)];
    const next = ROOM_ZONES.floor[Math.floor(Math.random() * ROOM_ZONES.floor.length)];
    const t = Math.random();
    const footX = point.x + (next.x - point.x) * t;
    const footY = point.y + (next.y - point.y) * t;
    const candidate = topLeftFromMochiFootCenter(footX, footY);
    const safe = findNearestWalkableMochiPosition(candidate.x, candidate.y, blockers, 64, {
      preferClearance: true,
      targetClearance: MOCHI_TARGET_CLEARANCE,
    });
    if (safe) return safe;
  }

  return findNearestWalkableMochiPosition(224, 300, blockers, 220, {
    preferClearance: true,
    targetClearance: MOCHI_TARGET_CLEARANCE,
  });
}

function defaultHintText() {
  return mode === 'edit'

let hintTimer = null;

function drawPolygon(ctx, points, fillStyle, strokeStyle) {
  ctx.save();
  ctx.beginPath();
  points.forEach((point, index) => {
    if (index === 0) ctx.moveTo(point.x, point.y);
    else ctx.lineTo(point.x, point.y);
  });
  ctx.closePath();
  ctx.fillStyle = fillStyle;
  ctx.strokeStyle = strokeStyle;
  ctx.lineWidth = 2;
  ctx.setLineDash([7, 5]);
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

function drawPlacementGuide(ctx, surface, valid) {
  const fill = valid ? 'rgba(107,255,184,0.10)' : 'rgba(255,107,107,0.10)';
  const stroke = valid ? 'rgba(107,255,184,0.65)' : 'rgba(255,107,107,0.65)';
  if (surface === 'wall') {
    drawPolygon(ctx, ROOM_ZONES.leftWall, fill, stroke);
    drawPolygon(ctx, ROOM_ZONES.rightWall, fill, stroke);
  } else {
    drawPolygon(ctx, ROOM_ZONES.floor, fill, stroke);
  }
}

function drawFootprint(ctx, footprint, valid) {
  ctx.save();
  ctx.fillStyle = valid ? 'rgba(107,255,184,0.14)' : 'rgba(255,107,107,0.18)';
  ctx.strokeStyle = valid ? 'rgba(107,255,184,0.95)' : 'rgba(255,107,107,0.95)';
  ctx.lineWidth = 2;
  for (const row of footprint.rows) {
    ctx.fillRect(row.minX, row.y, row.maxX - row.minX + 1, 1);
  }

  ctx.globalAlpha = 0.9;
  for (const row of footprint.rows) {
    ctx.fillRect(row.minX, row.y, 1, 1);
    ctx.fillRect(row.maxX, row.y, 1, 1);
  }
  ctx.restore();
}

};

function buildMochiFrameCanvases(name, img, frames) {
  const paddedSize = S + MOCHI_FRAME_PADDING * 2;
  mochiFrameCanvases[name] = [];
  for (let frame = 0; frame < frames; frame++) {
    const canvas = document.createElement('canvas');
    canvas.width = paddedSize;
    canvas.height = paddedSize;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0, 0, paddedSize, paddedSize);
    ctx.drawImage(img, frame * S, 0, S, S, MOCHI_FRAME_PADDING, MOCHI_FRAME_PADDING, S, S);
    mochiFrameCanvases[name].push(canvas);
  }
}

let mochiAnim = 'waiting', mochiFrame = 0, mochiLastT = 0, mochiAnimCb = null;
let mochiX = 240, mochiY = 350, mochiTargetX = null, mochiTargetY = null, mochiDestinationX = null, mochiDestinationY = null;
let mochiFlip = false, mochiMoveCb = null, mochiPath = [], mochiMoveMode = 'walk';
let mochiHopStartX = null, mochiHopStartY = null, mochiHopDistance = 1;
let mochiLastProgressX = mochiX, mochiLastProgressY = mochiY, mochiLastProgressAt = Date.now(), mochiRecovering = false;
let playToyX = 0, playToyY = 0, playToyInside = false, lastToyFollowAt = 0, lastToyTarget = null;

// ═══════ FOOD BOWL STATE ═══════
// Bowl fullness: stored per-room in localStorage
// Key: bowlState_{roomNum} = { "itemInstanceId": fullness (0-1) }
function getBowlStates() {
  const s = localStorage.getItem('bowlState_' + currentRoom);
  return s ? JSON.parse(s) : {};
}
function saveBowlStates(states) {
  localStorage.setItem('bowlState_' + currentRoom, JSON.stringify(states));
}
function isBowlItem(id) {
  return id && id.startsWith('bowl-');
}

let nextItemInstanceId = 0;
function makeItemInstanceId() {
  return 'item-' + Date.now().toString(36) + '-' + (nextItemInstanceId++).toString(36) + '-' + Math.random().toString(36).slice(2, 8);
}
function ensureItemInstanceId(item) {
  if (!item.instanceId) item.instanceId = makeItemInstanceId();
  return item.instanceId;
}
function getBowlStateKey(item, fallbackIndex) {
  return ensureItemInstanceId(item) || String(fallbackIndex);
}
function pruneBowlStates(items) {
  const states = getBowlStates();
  const validKeys = new Set(
    items
      .filter((item) => isBowlItem(item.id))
      .map((item, index) => getBowlStateKey(item, index))
  );
  let changed = false;
  for (const key of Object.keys(states)) {
    if (!validKeys.has(key)) {
      delete states[key];
      changed = true;
    }
  }
  if (changed) saveBowlStates(states);
}
function migrateLegacyBowlStates(items) {
  const states = getBowlStates();
  const migrated = {};
  let changed = false;
  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    const key = getBowlStateKey(item, i);
    if (Object.prototype.hasOwnProperty.call(states, key)) {
      migrated[key] = states[key];
    } else if (Object.prototype.hasOwnProperty.call(states, String(i))) {
      migrated[key] = states[String(i)];
      changed = true;
    }
  }
  if (changed || Object.keys(states).some((key) => /^\d+$/.test(key))) {
    saveBowlStates(migrated);
  }
}

// ═══════ AUTONOMOUS MOCHI (Play Mode) ═══════
let autoWanderTimer = null;

function startAutoWander() {
  stopAutoWander();
  if (mode !== 'play') return;

  const wander = () => {
    if (mode !== 'play' || mochiTargetX !== null || playToyInside) {
      autoWanderTimer = setTimeout(wander, playToyInside ? 900 : 3000);
      return;
    }

    const items = getPlacedItems();
    if (items.length > 0 && Math.random() > 0.3) {
      // Go interact with a random placed item
      const idx = Math.floor(Math.random() * items.length);
      const item = items[idx];
      const def = getCatalogItem(item.id);
      const target = findMochiInteractionTarget(item);
      const interact = def?.interact || 'play';
      if (!target) {
        autoWanderTimer = setTimeout(wander, 2500);
        return;
      }

      mochiMoveTo(target.x, target.y, () => {
        if (interact === 'eat' && isBowlItem(item.id)) {
          // Eat from bowl — deplete it
          const states = getBowlStates();
          const key = getBowlStateKey(item, idx);
          const fullness = states[key] !== undefined ? states[key] : 1;
          if (fullness > 0) {
            mochiPlay('eating', () => {
              states[key] = Math.max(0, fullness - 0.34);
              saveBowlStates(states);
              mochiSettle();
            });
          } else {
            mochiSettle();
          }
        } else if (interact === 'sleep') {
          mochiPlay('laydown', () => {
            setTimeout(() => mochiSettle(), 3000 + Math.random() * 4000);
          });
        } else if (interact === 'eat') {
          mochiPlay('eating', () => mochiSettle());
        } else {
          mochiPlay('dance', () => mochiSettle());
        }
      });
    } else {
      // Random walk to empty spot
      const target = findRandomWalkableMochiPosition();
      if (target) mochiMoveTo(target.x, target.y, () => mochiSettle());
    }

    autoWanderTimer = setTimeout(wander, 5000 + Math.random() * 8000);
  };

  autoWanderTimer = setTimeout(wander, 2000);
}

function stopAutoWander() {
  if (autoWanderTimer) { clearTimeout(autoWanderTimer); autoWanderTimer = null; }
}

function mochiPlay(name, cb) {
  if (!ANIMS[name]) return;
  mochiAnim = name; mochiFrame = 0; mochiLastT = 0; mochiAnimCb = cb || null;
}

function mochiSettle() {
  mochiPlay('waiting');
}

function faceMochiToward(x) {
  mochiFlip = x > mochiX + MOCHI_FOOT_CENTER.x;
}

function mochiJumpProgress() {
  if (mochiMoveMode !== 'hop' || mochiHopStartX === null || mochiTargetX === null) return 0;
  const remaining = Math.hypot(mochiTargetX - mochiX, mochiTargetY - mochiY);
  return Math.max(0, Math.min(1, 1 - remaining / Math.max(1, mochiHopDistance)));
}

function getMochiMoveSpeed() {
  if (mochiMoveMode !== 'hop') return MOCHI_SPEED;
  return Math.min(MOCHI_HOP_SPEED, Math.max(MOCHI_SPEED, mochiHopDistance / 52));
}

function getMochiHopHeight() {
  return Math.max(MOCHI_HOP_MIN_HEIGHT, Math.min(MOCHI_HOP_MAX_HEIGHT, 12 + mochiHopDistance * 0.13));
}

function getMochiHopScale(progress) {
  if (mochiMoveMode !== 'hop') return { x: 1, y: 1 };
  const air = Math.sin(progress * Math.PI);
  const takeoff = Math.max(0, 1 - progress / 0.16);
  const landing = Math.max(0, (progress - 0.84) / 0.16);
  const squash = Math.max(takeoff, landing) * 0.08;
  const stretch = air * 0.045;
  return {
    x: 1 + squash - stretch * 0.35,
    y: 1 - squash + stretch,
  };
}

function getPathDistance(start, path) {
  let distance = 0;
  let previous = start;
  for (const point of path) {
    distance += Math.hypot(point.x - previous.x, point.y - previous.y);
    previous = point;
  }
  return distance;
}

function resetMochiProgressTracker() {
  mochiLastProgressX = mochiX;
  mochiLastProgressY = mochiY;
  mochiLastProgressAt = Date.now();
}

function stopMochiMovement(settle = true) {
  mochiPath = [];
  mochiTargetX = null;
  mochiTargetY = null;
  mochiDestinationX = null;
  mochiDestinationY = null;
  mochiMoveMode = 'walk';
  mochiHopStartX = null;
  mochiHopStartY = null;
  mochiHopDistance = 1;
  mochiMoveCb = null;
  mochiRecovering = false;
  if (settle) mochiSettle();
}

function setNextMochiWaypoint() {
  const next = mochiPath.shift();
  if (!next) {
    mochiTargetX = null;
    mochiTargetY = null;
    mochiDestinationX = null;
    mochiDestinationY = null;
    mochiMoveMode = 'walk';
    mochiHopStartX = null;
    mochiHopStartY = null;
    mochiHopDistance = 1;
    saveMochiPos();
    if (mochiMoveCb) { const cb = mochiMoveCb; mochiMoveCb = null; cb(); }
    else mochiSettle();
    return;
  }

  mochiTargetX = next.x;
  mochiTargetY = next.y;
  mochiHopStartX = mochiMoveMode === 'hop' ? mochiX : null;
  mochiHopStartY = mochiMoveMode === 'hop' ? mochiY : null;
  mochiHopDistance = Math.max(1, Math.hypot(mochiTargetX - mochiX, mochiTargetY - mochiY));
  faceMochiToward(mochiTargetX + MOCHI_FOOT_CENTER.x);
  resetMochiProgressTracker();
  if (mochiAnim !== 'excited') mochiPlay('excited');
}

function beginMochiMovement(path, safeTarget, cb, mode = 'walk') {
  if (!path?.length) return false;
  mochiDestinationX = safeTarget.x;
  mochiDestinationY = safeTarget.y;
  mochiPath = path;
  mochiMoveMode = mode;
  mochiMoveCb = cb || null;
  mochiRecovering = false;
  resetMochiProgressTracker();
  setNextMochiWaypoint();
  return true;
}

function findMochiHopLanding(goal, blockers, maxDistance = MOCHI_MAX_HOP_DISTANCE) {
  const direct = findNearestWalkableMochiPosition(goal.x, goal.y, blockers, 96, {
    preferClearance: true,
    targetClearance: MOCHI_TARGET_CLEARANCE,
  });
  if (direct && Math.hypot(direct.x - mochiX, direct.y - mochiY) <= maxDistance) return direct;

  const angle = Math.atan2(goal.y - mochiY, goal.x - mochiX);
  const angleOffsets = [0, -0.35, 0.35, -0.7, 0.7, -1.05, 1.05];
  let best = null;
  let bestScore = -Infinity;

  for (let distance = maxDistance; distance >= 72; distance -= MOCHI_PATH_GRID) {
    for (const offset of angleOffsets) {
      const candidate = {
        x: mochiX + Math.cos(angle + offset) * distance,
        y: mochiY + Math.sin(angle + offset) * distance,
      };
      const safe = findNearestWalkableMochiPosition(candidate.x, candidate.y, blockers, 48, {
        preferClearance: true,
        targetClearance: MOCHI_TARGET_CLEARANCE,
      });
      if (!safe) continue;
      const hopDistance = Math.hypot(safe.x - mochiX, safe.y - mochiY);
      if (hopDistance > maxDistance) continue;
      const before = Math.hypot(goal.x - mochiX, goal.y - mochiY);
      const after = Math.hypot(goal.x - safe.x, goal.y - safe.y);
      const progress = before - after;
      if (progress < 24) continue;
      const clearance = getMochiClearance(safe.x, safe.y, blockers);
      const score = progress + Math.min(clearance, MOCHI_TARGET_CLEARANCE) * 2 - hopDistance * 0.08;
      if (score > bestScore) {
        best = safe;
        bestScore = score;
      }
    }
  }

  return best;
}

function recoverMochiMovement() {
  if (mochiRecovering) return false;
  const blockers = getMochiBlockingFootprints();
  const destination = mochiDestinationX !== null && mochiDestinationY !== null
    ? { x: mochiDestinationX, y: mochiDestinationY }
    : null;
  const cb = mochiMoveCb;
  let safeNearby = findNearestWalkableMochiPosition(mochiX, mochiY, blockers, 180, {
    preferClearance: true,
    targetClearance: MOCHI_TARGET_CLEARANCE,
    minSearchRadius: 48,
  });
  if (
    destination
    && safeNearby
    && Math.hypot(safeNearby.x - mochiX, safeNearby.y - mochiY) < 8
  ) {
    safeNearby = findMochiHopLanding(destination, blockers, MOCHI_MAX_HOP_DISTANCE) || safeNearby;
  }

  if (!safeNearby) {
    stopMochiMovement(true);
    return false;
  }

  const started = beginMochiMovement([safeNearby], destination || safeNearby, () => {
    mochiRecovering = false;
    if (destination && Math.hypot(destination.x - safeNearby.x, destination.y - safeNearby.y) > 8) {
      mochiMoveTo(destination.x, destination.y, cb, { hopAttempts: 1 });
    } else if (cb) {
      cb();
    } else {
      mochiSettle();
    }
  }, 'hop');
  if (started) mochiRecovering = true;
  return started;
}

function mochiMoveTo(tx, ty, cb, options = {}) {
  const blockers = getMochiBlockingFootprints();
  const safeTarget = options.safeTarget || findNearestWalkableMochiPosition(tx, ty, blockers, 180, {
    preferClearance: true,
    targetClearance: MOCHI_TARGET_CLEARANCE,
  });
  if (!safeTarget) {
    stopMochiMovement(true);
    return false;
  }

  if (!isMochiPositionWalkable(mochiX, mochiY, blockers)) {
    const rescue = findNearestWalkableMochiPosition(mochiX, mochiY, blockers, 180, {
      preferClearance: true,
      targetClearance: MOCHI_TARGET_CLEARANCE,
      minSearchRadius: 48,
    });
    if (rescue) {
      return beginMochiMovement([rescue], safeTarget, () => mochiMoveTo(safeTarget.x, safeTarget.y, cb, { ...options, safeTarget }), 'hop');
    }
  }

  const path = findMochiPath(mochiX, mochiY, safeTarget.x, safeTarget.y, blockers);
  if (!path.length) {
    const jumpDistance = Math.hypot(safeTarget.x - mochiX, safeTarget.y - mochiY);
    const maxHopDistance = options.maxHopDistance || MOCHI_MAX_HOP_DISTANCE;
    if (options.allowHop !== false && jumpDistance <= maxHopDistance) {
      return beginMochiMovement([safeTarget], safeTarget, cb, 'hop');
    }

    const hopAttempts = options.hopAttempts || 0;
    const hopLanding = options.allowHop !== false && hopAttempts < 4
      ? findMochiHopLanding(safeTarget, blockers, maxHopDistance)
      : null;
    if (hopLanding) {
      return beginMochiMovement([hopLanding], safeTarget, () => {
        if (Math.hypot(hopLanding.x - safeTarget.x, hopLanding.y - safeTarget.y) <= 8) {
          if (cb) cb();
          else mochiSettle();
        } else {
          mochiMoveTo(safeTarget.x, safeTarget.y, cb, { ...options, safeTarget, hopAttempts: hopAttempts + 1 });
        }
      }, 'hop');
    }

    stopMochiMovement(true);
    return false;
  }

  const jumpDistance = Math.hypot(safeTarget.x - mochiX, safeTarget.y - mochiY);
  const maxHopDistance = options.maxHopDistance || MOCHI_MAX_HOP_DISTANCE;
  const pathDistance = getPathDistance({ x: mochiX, y: mochiY }, path);
  const directBlocked = !lineIsWalkableForMochi({ x: mochiX, y: mochiY }, safeTarget, blockers);
  const hopWouldHelp = (
    options.allowHop !== false
    && directBlocked
    && jumpDistance >= (options.minHopDistance || MOCHI_HOP_MIN_DISTANCE)
    && jumpDistance <= maxHopDistance
    && (options.preferHop || pathDistance > jumpDistance * MOCHI_HOP_DETOUR_RATIO)
  );
  if (hopWouldHelp) {
    return beginMochiMovement([safeTarget], safeTarget, cb, 'hop');
  }

  return beginMochiMovement(path, safeTarget, cb, 'walk');
}
function loadMochiPos() {
  const s = localStorage.getItem('mochiPos_' + currentRoom);
  if (s) { const p = JSON.parse(s); mochiX = p.x; mochiY = p.y; }
  else { mochiX = 240; mochiY = 350; }
  mochiTargetX = null; mochiTargetY = null; mochiDestinationX = null; mochiDestinationY = null; mochiPath = [];
  mochiMoveMode = 'walk'; mochiHopStartX = null; mochiHopStartY = null; mochiHopDistance = 1;
  mochiRecovering = false;
  resetMochiProgressTracker();
}
function saveMochiPos() {
  localStorage.setItem('mochiPos_' + currentRoom, JSON.stringify({ x: mochiX, y: mochiY }));
}

// ═══════ ROOM STATE ═══════
let roomBgImg = null;
const roomCanvas = document.getElementById('room-canvas');
const rctx = roomCanvas.getContext('2d');
rctx.imageSmoothingEnabled = false;

function loadRoom(num) {
  currentRoom = num;
  localStorage.setItem('currentRoom', num);
  loadMochiPos();
  loadRoomLayout();
  document.querySelectorAll('.room-thumb').forEach((t, i) => t.classList.toggle('active', i + 1 === num));
  if (roomImgs[num]) { roomBgImg = roomImgs[num]; }
  else {
    const img = new Image();
    img.onload = () => { roomImgs[num] = img; roomBgImg = img; };
    img.src = ROOM_BASE + num + '.png';
  }
}
function loadRoomLayout() {
  const s = localStorage.getItem('roomLayout_' + currentRoom);
  const loadedItems = s ? JSON.parse(s) : [];
  const items = loadedItems.filter((item) => getCatalogItem(item.id));
  let changed = items.length !== loadedItems.length;
  for (const item of items) {
    if (!item.instanceId) {
      ensureItemInstanceId(item);
      changed = true;
    }
  }
  roomLayouts[currentRoom] = items;
  migrateLegacyBowlStates(items);
  if (changed) saveRoomLayout();
}
function saveRoomLayout() {
  const items = roomLayouts[currentRoom] || [];
  localStorage.setItem('roomLayout_' + currentRoom, JSON.stringify(items));
  pruneBowlStates(items);
}
function getPlacedItems() { return roomLayouts[currentRoom] || []; }

// Get the draw dimensions for an item
function getItemDims(item) {
  const def = getCatalogItem(item.id);
  if (def) return { w: def.cropW || def.w, h: def.cropH || def.h };
  return { w: 32, h: 32 };
}

// Draw a single item onto a context
function drawItem(ctx, item, x, y) {
  const def = getCatalogItem(item.id);
  if (def) {
    const img = itemImgs[def.src];
    if (!img) return;
    if (def.cropW) {
      ctx.drawImage(img, def.cropX||0, def.cropY||0, def.cropW, def.cropH, x, y, def.cropW, def.cropH);
    } else {
      ctx.drawImage(img, x, y, def.w, def.h);
    }
  }
}

function playToyCursorReady() {
  const def = getCatalogItem(MOCHI_TOY_ID);
  return !!(def && itemImgs[def.src]);
}

function getPlayToyCursorLayout() {
  const def = getCatalogItem(MOCHI_TOY_ID);
  const img = def && itemImgs[def.src];
  if (!def || !img) return null;

  const sw = def.cropW || def.w;
  const sh = def.cropH || def.h;
  const frameCount = def.id === 'toy-cat' && def.cropW ? Math.max(1, Math.floor(def.w / def.cropW)) : 1;
  const frame = frameCount > 1 ? Math.floor(Date.now() / 120) % frameCount : 0;
  const dw = sw * MOCHI_TOY_CURSOR_SCALE;
  const dh = sh * MOCHI_TOY_CURSOR_SCALE;
  return {
    def,
    img,
    sw,
    sh,
    frame,
    sx: (def.cropX || 0) + frame * sw,
    sy: def.cropY || 0,
    dw,
    dh,
    x: Math.round(playToyX - dw / 2),
    y: Math.round(playToyY - dh / 2),
  };
}

function getPlayToyChasePoint(cursorX = playToyX, cursorY = playToyY) {
  const layout = getPlayToyCursorLayout();
  if (!layout || layout.def.id !== 'toy-cat') return { x: cursorX, y: cursorY };
  const pom = MOCHI_TOY_POM_POINTS[layout.frame] || MOCHI_TOY_POM_POINTS[0];
  return {
    x: cursorX - layout.dw / 2 + pom.x * MOCHI_TOY_CURSOR_SCALE,
    y: cursorY - layout.dh / 2 + pom.y * MOCHI_TOY_CURSOR_SCALE,
  };
}

function drawPlayToyCursor(ctx) {
  if (mode !== 'play' || !playToyInside) return;
  const layout = getPlayToyCursorLayout();
  if (!layout) return;

  ctx.save();
  ctx.globalAlpha = 0.95;
  ctx.drawImage(layout.img, layout.sx, layout.sy, layout.sw, layout.sh, layout.x, layout.y, layout.dw, layout.dh);
  ctx.restore();
}

function requestMochiToyFollow(pos, force = false) {
  if (mode !== 'play') return;
  const now = Date.now();
  const chasePoint = getPlayToyChasePoint(pos.x, pos.y);
  const target = topLeftFromMochiFootCenter(chasePoint.x, chasePoint.y);
  if (!force && now - lastToyFollowAt < MOCHI_TOY_FOLLOW_MS) return;
  if (
    !force
    && lastToyTarget
    && Math.hypot(lastToyTarget.x - target.x, lastToyTarget.y - target.y) < MOCHI_TOY_DEADZONE
  ) return;

  const blockers = getMochiBlockingFootprints();
  const safeTarget = findNearestWalkableMochiPosition(target.x, target.y, blockers, 200, {
    preferClearance: true,
    targetClearance: MOCHI_TARGET_CLEARANCE,
  });
  if (!safeTarget) return;
  if (
    !force
    && mochiDestinationX !== null
    && Math.hypot(mochiDestinationX - safeTarget.x, mochiDestinationY - safeTarget.y) < MOCHI_TOY_DEADZONE
  ) return;
  if (
    !force
    && mochiMoveMode === 'hop'
    && lastToyTarget
    && Math.hypot(lastToyTarget.x - safeTarget.x, lastToyTarget.y - safeTarget.y) < MOCHI_TOY_DEADZONE * 2
  ) return;
  if (!force && mochiMoveMode === 'hop' && mochiJumpProgress() < 0.65) return;
  if (Math.hypot(safeTarget.x - mochiX, safeTarget.y - mochiY) < 8) {
    lastToyFollowAt = now;
    lastToyTarget = safeTarget;
    faceMochiToward(chasePoint.x);
    if (mochiTargetX === null) mochiSettle();
    return;
  }

  lastToyFollowAt = now;
  lastToyTarget = safeTarget;
  mochiMoveTo(safeTarget.x, safeTarget.y, () => mochiSettle(), { maxHopDistance: MOCHI_MAX_HOP_DISTANCE, safeTarget, preferHop: true });
}

// ═══════ RENDER ═══════
let dragPreview = null;

function render(t) {
  rctx.clearRect(0, 0, 512, 512);
  if (roomBgImg) rctx.drawImage(roomBgImg, 0, 0, 512, 512);
  if (dragPreview) drawPlacementGuide(rctx, dragPreview.surface, dragPreview.valid);

  const drawables = [];

  // Placed items
  const bowlStates = getBowlStates();
  const placedItems = getPlacedItems();
  for (let i = 0; i < placedItems.length; i++) {
    const item = placedItems[i];
    const dims = getItemDims(item);
    const bowlKey = getBowlStateKey(item, i);
    const sortFootprint = getPlacementSurface(item.id) === 'floor'
      ? getCollisionFootprint(item.id, item.x, item.y, dims)
      : null;
    const sortY = sortFootprint ? sortFootprint.rect.y + sortFootprint.rect.h : item.y + dims.h;
    drawables.push({ y: sortY, draw: () => {
      drawItem(rctx, item, item.x, item.y);
      // Draw bowl fullness indicator
      if (isBowlItem(item.id)) {
        const fullness = bowlStates[bowlKey] !== undefined ? bowlStates[bowlKey] : 1;
        if (fullness < 1) {
          // Draw a small bar under the bowl
          const bw = dims.w, bx = item.x, by = item.y + dims.h + 2;
          rctx.fillStyle = 'rgba(0,0,0,0.4)';
          rctx.fillRect(bx, by, bw, 3);
          rctx.fillStyle = fullness > 0.5 ? '#6BFFB8' : fullness > 0 ? '#FFD96B' : '#FF6B6B';
          rctx.fillRect(bx, by, bw * fullness, 3);
        }
      }
    }});
  }

  // Mochi movement
  if (mochiTargetX !== null) {
    const dx = mochiTargetX - mochiX, dy = mochiTargetY - mochiY;
    const dist = Math.hypot(dx, dy);
    const moveSpeed = getMochiMoveSpeed();
    if (dist <= moveSpeed) {
      mochiX = mochiTargetX; mochiY = mochiTargetY;
      setNextMochiWaypoint();
    } else {
      const nextX = mochiX + (dx / dist) * moveSpeed;
      const nextY = mochiY + (dy / dist) * moveSpeed;
      if (mochiMoveMode === 'hop' || isMochiPositionWalkable(nextX, nextY)) {
        mochiX = nextX;
        mochiY = nextY;
        faceMochiToward(mochiTargetX + MOCHI_FOOT_CENTER.x);
        if (mochiAnim !== 'excited') mochiPlay('excited');
      } else {
        const blockers = getMochiBlockingFootprints();
        const destination = { x: mochiDestinationX ?? mochiTargetX, y: mochiDestinationY ?? mochiTargetY };
        const path = findMochiPath(mochiX, mochiY, destination.x, destination.y, blockers);
        if (path.length) {
          beginMochiMovement(path, destination, mochiMoveCb, 'walk');
        } else {
          const safeTarget = findNearestWalkableMochiPosition(destination.x, destination.y, blockers, 180, {
            preferClearance: true,
            targetClearance: MOCHI_TARGET_CLEARANCE,
          });
          if (safeTarget && Math.hypot(safeTarget.x - mochiX, safeTarget.y - mochiY) <= MOCHI_MAX_HOP_DISTANCE) {
            beginMochiMovement([safeTarget], safeTarget, mochiMoveCb, 'hop');
          } else if (!recoverMochiMovement()) {
            stopMochiMovement(true);
          } else {
            resetMochiProgressTracker();
          }
        }
      }
    }

    if (mochiTargetX !== null) {
      const movedSinceLastCheck = Math.hypot(mochiX - mochiLastProgressX, mochiY - mochiLastProgressY);
      if (movedSinceLastCheck >= MOCHI_PROGRESS_EPSILON) {
        resetMochiProgressTracker();
      } else if (Date.now() - mochiLastProgressAt > MOCHI_STUCK_MS) {
        recoverMochiMovement();
      }
    }
  }

  // Mochi frame
  const ad = ANIMS[mochiAnim], ai = mochiImgs[mochiAnim];
  if (ad && ai && t - mochiLastT >= ad.speed) {
    mochiLastT = t;
    if (mochiFrame >= ad.frames) {
      if (mochiAnimCb) { const cb = mochiAnimCb; mochiAnimCb = null; cb(); }
      mochiFrame = 0;
    }
    mochiFrame++;
  }

  const mf = Math.max(0, Math.min((mochiFrame || 1) - 1, (ANIMS[mochiAnim]?.frames || 1) - 1));
  const hopProgress = mochiJumpProgress();
  const jumpOffset = mochiMoveMode === 'hop'
    ? Math.sin(hopProgress * Math.PI) * getMochiHopHeight()
    : 0;
  const hopScale = getMochiHopScale(hopProgress);
  const mochiSortFootprint = getMochiFootprintAt(mochiX, mochiY, mochiFlip);
  const mochiSortY = mochiSortFootprint ? mochiSortFootprint.rect.y + mochiSortFootprint.rect.h : mochiY + MOCHI_FOOT_CENTER.y;
  drawables.push({ y: mochiSortY, draw: () => {
    rctx.save();
    rctx.imageSmoothingEnabled = false;
    const frameCanvas = mochiFrameCanvases[mochiAnim]?.[mf];
    const padScale = MOCHI_DRAW_SIZE / S;
    const frameInset = MOCHI_FRAME_PADDING * padScale;
    const frameDrawSize = MOCHI_DRAW_SIZE + frameInset * 2;
    const baseX = Math.round(mochiX - frameInset);
    const baseY = Math.round(mochiY - jumpOffset - frameInset);
    const drawW = frameDrawSize * hopScale.x;
    const drawH = frameDrawSize * hopScale.y;
    const drawX = Math.round(baseX - (drawW - frameDrawSize) / 2);
    const drawY = Math.round(baseY + frameDrawSize - drawH);
    if (mochiMoveMode === 'hop') {
      const shadowWidth = Math.max(18, 34 - Math.sin(hopProgress * Math.PI) * 10);
      const shadowX = Math.round(mochiX + MOCHI_FOOT_CENTER.x - shadowWidth / 2);
      const shadowY = Math.round(mochiY + MOCHI_FOOT_CENTER.y + 4);
      rctx.fillStyle = `rgba(26, 23, 31, ${0.18 - Math.sin(hopProgress * Math.PI) * 0.06})`;
      rctx.beginPath();
      rctx.ellipse(shadowX + shadowWidth / 2, shadowY, shadowWidth / 2, 4, 0, 0, Math.PI * 2);
      rctx.fill();
    }
    if (mochiFlip) {
      rctx.translate(drawX + drawW, drawY);
      rctx.scale(-1, 1);
      if (frameCanvas) rctx.drawImage(frameCanvas, 0, 0, drawW, drawH);
      else if (ai) rctx.drawImage(ai, mf * S, 0, S, S, frameInset, frameInset, MOCHI_DRAW_SIZE * hopScale.x, MOCHI_DRAW_SIZE * hopScale.y);
    } else {
      if (frameCanvas) rctx.drawImage(frameCanvas, drawX, drawY, drawW, drawH);
      else if (ai) rctx.drawImage(ai, mf * S, 0, S, S, drawX + frameInset, drawY + frameInset, MOCHI_DRAW_SIZE * hopScale.x, MOCHI_DRAW_SIZE * hopScale.y);
    }
    rctx.restore();
  }});

  if (groupRoomId) addGroupCatDrawables(drawables, t);

  drawables.sort((a, b) => a.y - b.y);
  for (const d of drawables) d.draw();

  if (mode === 'edit' && !dragPreview) {
    for (let i = 0; i < placedItems.length; i++) {
      const item = placedItems[i];
      const dims = getItemDims(item);
      const placement = validatePlacement(item.id, item.x, item.y, dims, { ignoreIndex: i });
      if (!placement.valid) {
        drawFootprint(rctx, getPreviewFootprint(item.id, item.x, item.y, dims), false);
      }
    }
  }

  // Drag preview
  if (dragPreview) {
    const dw = dragPreview.dw || 16;
    const dh = dragPreview.dh || 16;
    const px = dragPreview.x - dw / 2;
    const py = dragPreview.y - dh / 2;
    rctx.save();
    rctx.globalAlpha = dragPreview.valid ? 0.65 : 0.35;
    drawItem(rctx, dragPreview, px, py);
    rctx.restore();
    drawFootprint(rctx, getPreviewFootprint(dragPreview.id, px, py, { w: dw, h: dh }), dragPreview.valid);
  }

  drawPlayToyCursor(rctx);

  requestAnimationFrame(render);
}

// ═══════ ROOM PICKER ═══════
function setupRoomPicker() {
  const picker = document.getElementById('room-picker');
  for (let i = 1; i <= ROOM_COUNT; i++) {
    const c = document.createElement('canvas');
    c.width = 48; c.height = 48;
    c.className = 'room-thumb' + (i === currentRoom ? ' active' : '');
    c.title = 'Room ' + i;
    const num = i;
    const img = new Image();
    img.onload = () => {
      const tc = c.getContext('2d');
      tc.imageSmoothingEnabled = false;
      tc.drawImage(img, 0, 0, 512, 512, 0, 0, 48, 48);
      roomImgs[num] = img;
    };
    img.src = ROOM_BASE + i + '.png';
    c.onclick = () => loadRoom(num);
    picker.appendChild(c);
  }
}

// ═══════ PALETTE ═══════
const thumbSourceRectCache = new Map();

function getThumbSourceRect(_img, item) {
  const cacheKey = item.id;
  if (thumbSourceRectCache.has(cacheKey)) return thumbSourceRectCache.get(cacheKey);

  const rect = {
    sx: item.cropX || 0,
    sy: item.cropY || 0,
    sw: item.cropW || item.w,
    sh: item.cropH || item.h,
  };

  thumbSourceRectCache.set(cacheKey, rect);
  return rect;
}

function setupPalette() {
  const palette = document.getElementById('palette');

  // Group by category, preserving order
  const catOrder = [];
  const catItems = {};
  for (const item of CATALOG) {
    if (!catItems[item.cat]) { catOrder.push(item.cat); catItems[item.cat] = []; }
    catItems[item.cat].push(item);
  }

  for (const cat of catOrder) {
    const label = document.createElement('div');
    label.className = 'pal-cat open';
    label.textContent = cat;
    palette.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'pal-grid';

    label.onclick = () => {
      label.classList.toggle('open');
      grid.classList.toggle('hidden');
    };

    for (const item of catItems[cat]) {
      const el = document.createElement('div');
      el.className = 'pal-item';
      el.title = item.name;

      const thumb = document.createElement('canvas');
      thumb.width = 64; thumb.height = 64;
      el.appendChild(thumb);

      const lbl = document.createElement('div');
      lbl.className = 'pal-item-label';
      lbl.textContent = item.name;
      el.appendChild(lbl);

      // Draw thumbnail
      const tryDraw = () => {
        const img = itemImgs[item.src];
        if (!img) return false;
        const tc = thumb.getContext('2d');
        tc.imageSmoothingEnabled = false;
        tc.webkitImageSmoothingEnabled = false;
        tc.mozImageSmoothingEnabled = false;
        tc.msImageSmoothingEnabled = false;
        tc.clearRect(0, 0, 64, 64);
        const src = getThumbSourceRect(img, item);
        const scale = Math.min(58 / src.sw, 58 / src.sh);
        const dw = Math.max(1, Math.round(src.sw * scale));
        const dh = Math.max(1, Math.round(src.sh * scale));
        const dx = Math.floor((64 - dw) / 2);
        const dy = Math.floor((64 - dh) / 2);
        tc.drawImage(img, src.sx, src.sy, src.sw, src.sh, dx, dy, dw, dh);
        return true;
      };
      if (!tryDraw()) {
        const iv = setInterval(() => { if (tryDraw()) clearInterval(iv); }, 100);
      }

      el.addEventListener('mousedown', (e) => {
        if (mode !== 'edit') return;
        e.preventDefault();
        const dims = getItemDims(item);
        startDrag({ id: item.id, dw: dims.w, dh: dims.h }, e);
      });

      grid.appendChild(el);
    }
    palette.appendChild(grid);
  }
}

// ═══════ DRAG & DROP ═══════
let dragging = null;
let dragExistingIdx = -1;

function canvasCoords(e) {
  const rect = roomCanvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (512 / rect.width);
  const y = (e.clientY - rect.top) * (512 / rect.height);
  return { x, y, inside: x >= 0 && x <= 512 && y >= 0 && y <= 512 };
}

roomCanvas.addEventListener('mousemove', (e) => {
  if (mode !== 'play' || dragging) return;
  const pos = canvasCoords(e);
  playToyInside = pos.inside;
  if (!pos.inside) {
    roomCanvas.style.cursor = 'pointer';
    return;
  }

  playToyX = pos.x;
  playToyY = pos.y;
  roomCanvas.style.cursor = playToyCursorReady() ? 'none' : 'pointer';
  requestMochiToyFollow(pos);
});

roomCanvas.addEventListener('mouseenter', (e) => {
  if (mode !== 'play' || dragging) return;
  const pos = canvasCoords(e);
  playToyInside = pos.inside;
  if (pos.inside) {
    playToyX = pos.x;
    playToyY = pos.y;
    roomCanvas.style.cursor = playToyCursorReady() ? 'none' : 'pointer';
    requestMochiToyFollow(pos, true);
  }
});

roomCanvas.addEventListener('mouseleave', () => {
  playToyInside = false;
  lastToyTarget = null;
  roomCanvas.style.cursor = mode === 'edit' ? 'crosshair' : 'pointer';
});

function startDrag(itemData, e) {
  dragging = {
    ...itemData,
    fromPalette: true,
    offsetX: (itemData.dw || 32) / 2,
    offsetY: (itemData.dh || 32) / 2,
  };
  dragExistingIdx = -1;
  e.preventDefault();
}

function getDragTopLeft(drag, pos) {
  const dw = drag.dw || 32, dh = drag.dh || 32;
  return {
    x: Math.round(pos.x - (drag.offsetX ?? dw / 2)),
    y: Math.round(pos.y - (drag.offsetY ?? dh / 2)),
    w: dw,
    h: dh,
  };
}

document.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const pos = canvasCoords(e);
  if (pos.inside) {
    const topLeft = getDragTopLeft(dragging, pos);
    const placement = validatePlacement(dragging.id, topLeft.x, topLeft.y, { w: topLeft.w, h: topLeft.h }, {
      ignoreIndex: dragExistingIdx,
    });
    dragPreview = {
      ...dragging,
      x: topLeft.x + topLeft.w / 2,
      y: topLeft.y + topLeft.h / 2,
      valid: placement.valid,
      surface: placement.surface,
    };
    roomCanvas.style.cursor = placement.valid ? 'copy' : 'not-allowed';
  } else {
    dragPreview = null;
    roomCanvas.style.cursor = 'not-allowed';
  }
});

document.addEventListener('mouseup', (e) => {
  if (!dragging) return;
  const pos = canvasCoords(e);

  if (pos.inside) {
    const topLeft = getDragTopLeft(dragging, pos);
    const px = topLeft.x;
    const py = topLeft.y;
    const placement = validatePlacement(dragging.id, px, py, { w: topLeft.w, h: topLeft.h }, {
      ignoreIndex: dragExistingIdx,
    });

    if (!placement.valid) {
      setHint(placement.message, true);
    } else if (dragExistingIdx >= 0) {
      const items = getPlacedItems();
      items[dragExistingIdx].x = px;
      items[dragExistingIdx].y = py;
    } else {
      const items = getPlacedItems();
      items.push({ id: dragging.id, x: px, y: py, instanceId: makeItemInstanceId() });
      roomLayouts[currentRoom] = items;
    }
    saveRoomLayout();
  }

  dragging = null;
  dragPreview = null;
  dragExistingIdx = -1;
  roomCanvas.style.cursor = mode === 'edit' ? 'crosshair' : (playToyInside ? 'none' : 'pointer');
});

// ═══════ ROOM CANVAS INTERACTION ═══════
roomCanvas.addEventListener('click', (e) => {
  const pos = canvasCoords(e);
  if (!pos.inside) return;

  if (mode === 'edit') {
    return; // Edit clicks handled by mousedown for dragging
  } else if (mode === 'play') {
    const items = getPlacedItems();
    for (let i = items.length - 1; i >= 0; i--) {
      const item = items[i];
      const def = getCatalogItem(item.id);
      const dims = getItemDims(item);
      if (pos.x >= item.x && pos.x <= item.x + dims.w && pos.y >= item.y && pos.y <= item.y + dims.h) {
        const target = findMochiInteractionTarget(item);
        const interact = def?.interact || 'play';
        if (!target) {
          mochiSettle();
          return;
        }

        // Bowl: click to refill if empty, otherwise Mochi goes to eat
        if (isBowlItem(item.id)) {
          const states = getBowlStates();
          const key = getBowlStateKey(item, i);
          const fullness = states[key] !== undefined ? states[key] : 1;
          if (fullness <= 0) {
            // Refill the bowl
            states[key] = 1;
            saveBowlStates(states);
            return;
          }
          // Mochi walks over and eats
          mochiMoveTo(target.x, target.y, () => {
            const st = getBowlStates();
            const f = st[key] !== undefined ? st[key] : 1;
            if (f > 0) {
              mochiPlay('eating', () => {
                st[key] = Math.max(0, f - 0.34);
                saveBowlStates(st);
                mochiSettle();
              });
            } else {
              mochiSettle();
            }
          });
          return;
        }

        mochiMoveTo(target.x, target.y, () => {
          if (interact === 'sleep') mochiPlay('laydown', () => mochiPlay('sleep'));
          else if (interact === 'eat') mochiPlay('eating', () => mochiSettle());
          else mochiPlay('dance', () => mochiSettle());
        });
        return;
      }
    }
    mochiMoveTo(pos.x - MOCHI_DRAW_SIZE / 2, pos.y - MOCHI_FOOT_CENTER.y, () => mochiSettle());
  }
});

// Mousedown for dragging existing placed items in edit mode
roomCanvas.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return; // Only left click for dragging
  if (mode !== 'edit') return;
  const pos = canvasCoords(e);
  if (!pos.inside) return;
  const items = getPlacedItems();
  for (let i = items.length - 1; i >= 0; i--) {
    const item = items[i];
    const dims = getItemDims(item);
    if (pos.x >= item.x && pos.x <= item.x + dims.w && pos.y >= item.y && pos.y <= item.y + dims.h) {
      dragging = {
        id: item.id,
        dw: dims.w,
        dh: dims.h,
        fromPalette: false,
        offsetX: pos.x - item.x,
        offsetY: pos.y - item.y,
      };
      dragExistingIdx = i;
      const placement = validatePlacement(item.id, item.x, item.y, dims, { ignoreIndex: i });
      dragPreview = {
        ...dragging,
        x: item.x + dims.w / 2,
        y: item.y + dims.h / 2,
        valid: placement.valid,
        surface: placement.surface,
      };
      e.preventDefault();
      return;
    }
  }
});

roomCanvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  if (mode !== 'edit') return;
  const pos = canvasCoords(e);
  const items = getPlacedItems();
  for (let i = items.length - 1; i >= 0; i--) {
    const dims = getItemDims(items[i]);
    if (pos.x >= items[i].x && pos.x <= items[i].x + dims.w && pos.y >= items[i].y && pos.y <= items[i].y + dims.h) {
      items.splice(i, 1);
      saveRoomLayout();
      return;
    }
  }
});

// ═══════ GROUP MODE ═══════
const GROUP_ROOM_NUM = 1;
const GROUP_CHAT_MAX = 180;
const GROUP_MEMBER_STALE_MS = 60000;
const GROUP_BUBBLE_MS = 4200;
const GROUP_CAT_MIN_DISTANCE = 62;
const GROUP_CAT_MOVE_SPEED = 0.055;
const GROUP_CAT_WANDER_MIN_MS = 4500;
const GROUP_CAT_WANDER_SPREAD_MS = 6500;
const GROUP_ROOM_PRESENCE_MS = 1200;
const GROUP_SEAT_POSITIONS = [
  { x: 160, y: 330 },
  { x: 340, y: 330 },
  { x: 120, y: 220 },
  { x: 380, y: 220 },
  { x: 250, y: 400 },
  { x: 250, y: 180 },
  { x: 90,  y: 290 },
  { x: 410, y: 290 },
];
const GROUP_ANIM_SPECS = {
  idle:    { src: SPRITES + 'Idle.png',    frames: 10, speed: 150 },
  sleep:   { src: SPRITES + 'Sleep.png',   frames: 4,  speed: 350 },
  excited: { src: SPRITES + 'Excited.png', frames: 12, speed: 120 },
  sleepy:  { src: SPRITES + 'Sleepy.png',  frames: 8,  speed: 200 },
  sick:    { src: SPRITES + 'catsick1.png',frames: 5,  speed: 300 },
};
const GROUP_ATLAS_ANIM_ROWS = { idle: 0, sleepy: 4, excited: 5, sleep: 11 };

for (const [name, spec] of Object.entries(GROUP_ANIM_SPECS)) {

const groupAtlasCache = new Map(); // key -> { img, loaded }
function getGroupAtlas(appearance) {
  const ribbon = appearance?.selectedRibbon || null;
  const skin = appearance?.selectedSkin || null;
  const key = ribbon ? 'ribbon:' + ribbon : skin ? 'skin:' + skin : 'classic';

    ? 'assets/cat-pack-paid/CatPackPaid/Sprites/CatwithRibbon/CatPackRibbon' + ribbon + '.png'
    : 'assets/cat-pack-paid/CatPackPaid/CatPackDifferentSkins/' + skin;
