<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sleepy Pet</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: transparent; overflow: hidden; user-select: none; font-family: -apple-system, sans-serif; }
    body { width: 340px; height: 440px; }

    /* ── Cat canvas ── */
    #cat-canvas {
      position: absolute;
      bottom: 4px; right: 4px;
      width: 64px; height: 64px;
      image-rendering: pixelated;
      cursor: pointer;
      background: transparent;
    }

    /* ── Mini room view ── */
    #room-view {
      position: absolute;
      bottom: 4px; right: 4px;
      width: 220px; height: 220px;
      image-rendering: pixelated;
      cursor: grab;
      background: transparent;
      display: none;
      border-radius: 8px;
    }
    #room-view:active { cursor: grabbing; }
    #room-view.show { display: block; }

    /* ── Speech bubble ── */
    .bubble {
      position: absolute; bottom: 72px; right: 4px;
      background: rgba(35, 28, 50, 0.92);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: 5px 10px;
      font-size: 11px; color: #ede6f8; white-space: nowrap;
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    .bubble.show { opacity: 1; }
    .bubble::after {
      content: ''; position: absolute; bottom: -5px; right: 20px;
      border-left: 5px solid transparent; border-right: 5px solid transparent;
      border-top: 5px solid rgba(35, 28, 50, 0.92);
    }

    /* ── Menu ── */
    .menu {
      position: absolute; bottom: 72px; right: 4px;
      display: none; flex-direction: column; gap: 3px;
    }
    .menu.open { display: flex; }
    .menu-btn {
      background: rgba(35, 28, 50, 0.94);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: 7px 14px;
      color: #ede6f8; font-size: 11px; font-weight: 600;
      cursor: pointer; white-space: nowrap; text-align: left;
      transition: background 0.15s;
    }
    .menu-btn:hover { background: rgba(108, 92, 231, 0.55); }

    /* ── Panel shared ── */
    .panel {
      position: absolute; bottom: 72px; right: 4px;
      background: rgba(28, 22, 48, 0.94);
      backdrop-filter: blur(16px) saturate(1.3); -webkit-backdrop-filter: blur(16px) saturate(1.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 14px;
      color: #ede6f8; font-size: 12px;
      display: none;
    }
    .panel.open { display: block; }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .panel-header h3 { font-size: 13px; font-weight: 600; }
    .panel-close {
      background: none; border: none; color: rgba(255,255,255,0.4);
      font-size: 16px; cursor: pointer; padding: 0 4px; line-height: 1;
    }
    .panel-close:hover { color: rgba(255,255,255,0.8); }

    /* ── Settings (retro pixel style) ── */
    #settings-panel { width: 180px; }
    .lbl {
      display: block; font-size: 8px; text-transform: uppercase;
      letter-spacing: 1.2px; color: rgba(200,180,255,0.5);
      margin-bottom: 3px; margin-top: 8px;
      font-family: monospace;
    }
    .lbl:first-of-type { margin-top: 0; }
    .time-row {
      display: flex; align-items: center; gap: 4px;
    }
    .time-btn {
      width: 20px; height: 20px; border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px; background: rgba(255,255,255,0.06);
      color: #c8b4ff; font-size: 12px; font-weight: bold;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-family: monospace; line-height: 1;
    }
    .time-btn:hover { background: rgba(108,92,231,0.3); }
    .time-btn:active { background: rgba(108,92,231,0.5); }
    .time-display {
      flex: 1; text-align: center;
      font-family: monospace; font-size: 13px; font-weight: bold;
      color: #e0d4ff; letter-spacing: 1px;
    }
    .sleep-info { margin-top: 10px; text-align: center; }
    .sleep-dur {
      font-family: monospace; font-weight: bold; font-size: 11px;
      color: #c8b4ff; letter-spacing: 0.5px;
    }
    .sleep-bar { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; margin-top: 4px; }
    .sleep-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s, background 0.5s; }
    .sleep-qual { font-family: monospace; font-size: 8px; font-weight: 500; margin-top: 3px; text-align: center; letter-spacing: 0.5px; }
    .streak-row {
      margin-top: 10px; padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.06);
      text-align: center;
    }
    .streak-count {
      font-family: monospace; font-size: 18px; font-weight: bold;
      color: #FFD96B; letter-spacing: 1px;
    }
    .streak-label {
      font-family: monospace; font-size: 7px; text-transform: uppercase;
      letter-spacing: 1.2px; color: rgba(200,180,255,0.4); margin-top: 2px;
    }

    /* ── Inventory ── */
    #inv-panel { width: 220px; }
    .inv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 6px; }
    .inv-item {
      aspect-ratio: 1; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; background: rgba(255,255,255,0.05);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      overflow: hidden; transition: border-color 0.2s;
    }
    .inv-item:hover { background: rgba(255,255,255,0.1); }
    .inv-item.sel { border-color: rgba(108,92,231,0.6); background: rgba(108,92,231,0.2); }
    .inv-item canvas { width: 100%; height: 100%; image-rendering: pixelated; }
    .inv-item.locked { opacity: 0.35; cursor: default; position: relative; }
    .inv-item.locked:hover { background: rgba(255,255,255,0.05); }
    .inv-lock {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: monospace; font-size: 8px;
      color: rgba(255,200,100,0.8); text-align: center;
      line-height: 1.3; pointer-events: none;
    }
    .inv-lock-icon { font-size: 14px; }
    .inv-section { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: rgba(255,255,255,0.35); margin-top: 10px; margin-bottom: 4px; }
    .inv-section:first-child { margin-top: 0; }
    .inv-none { font-size: 9px; color: rgba(255,255,255,0.3); font-weight: 600; }
    .inv-preview { width: 64px; height: 64px; image-rendering: pixelated; margin: 0 auto 8px; display: block; border-radius: 8px; background: rgba(255,255,255,0.05); }
  </style>
</head>
<body>
  <!-- Cat -->
  <canvas id="cat-canvas" width="32" height="32"></canvas>
  <canvas id="room-view" width="220" height="220"></canvas>
  <div class="bubble" id="bubble"></div>

  <!-- Menu -->
  <div class="menu" id="menu">
    <button class="menu-btn" data-action="goodnight" id="goodnight-btn">Goodnight</button>
    <button class="menu-btn" data-action="settings">Sleep</button>
    <button class="menu-btn" data-action="room">Edit Room</button>
    <button class="menu-btn" data-action="viewroom" id="viewroom-btn">View Room</button>
    <button class="menu-btn" data-action="inv">Inventory</button>
    <button class="menu-btn" data-action="follow" id="follow-btn">Follow Mouse</button>
    <button class="menu-btn" data-action="hide">Hide Mochi</button>
    <button class="menu-btn" data-action="quit">Quit</button>
  </div>

  <!-- Settings -->
  <div class="panel" id="settings-panel">
    <div class="panel-header"><h3 style="font-family:monospace;font-size:11px;letter-spacing:1px">Sleep</h3><button class="panel-close" data-panel="settings-panel">&times;</button></div>
    <span class="lbl">Bedtime</span>
    <div class="time-row">
      <button class="time-btn" data-target="bedtime" data-dir="-1">-</button>
      <span class="time-display" id="bed-display">10:30 PM</span>
      <button class="time-btn" data-target="bedtime" data-dir="1">+</button>
    </div>
    <span class="lbl">Wake up</span>
    <div class="time-row">
      <button class="time-btn" data-target="alarm" data-dir="-1">-</button>
      <span class="time-display" id="alarm-display">7:00 AM</span>
      <button class="time-btn" data-target="alarm" data-dir="1">+</button>
    </div>
    <div class="sleep-info">
      <span class="sleep-dur" id="sleep-dur">8h 30m</span>
    </div>
    <div class="sleep-bar"><div class="sleep-bar-fill" id="bar-fill"></div></div>
    <div class="sleep-qual" id="sleep-qual"></div>
    <div class="streak-row">
      <div class="streak-count" id="streak-count">0</div>
      <div class="streak-label">night streak</div>
    </div>
  </div>

  <!-- Inventory -->
  <div class="panel" id="inv-panel">
    <div class="panel-header"><h3>Inventory</h3><button class="panel-close" data-panel="inv-panel">&times;</button></div>
    <canvas class="inv-preview" id="inv-preview" width="32" height="32"></canvas>
    <div class="inv-section">Ribbons</div>
    <div class="inv-grid" id="ribbon-grid"></div>
    <div class="inv-section">Skins</div>
    <div class="inv-grid" id="skin-grid"></div>
  </div>

  <script>
    // ═══════ MOUSE CLICK-THROUGH ═══════
    // Window ignores mouse by default. When mouse enters visible content,
    // we tell main process to stop ignoring so we can interact.
    const interactiveEls = ['cat-canvas', 'room-view', 'menu', 'settings-panel', 'inv-panel'];

    function setupClickThrough() {
      for (const id of interactiveEls) {
        const el = document.getElementById(id);
        el.addEventListener('mouseenter', () => {
          window.electronAPI?.setIgnoreMouse(false);
        });
        el.addEventListener('mouseleave', () => {
          window.electronAPI?.setIgnoreMouse(true);
        });
      }
    }

    // ═══════ SPRITE ENGINE ═══════
    const S = 32;
    const canvas = document.getElementById('cat-canvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    const BASE = 'assets/cat-pack-paid/CatPackPaid/Sprites/Classical/Individual/';
    const ANIMS = {
      idle:      { src: BASE+'Idle.png', frames: 10, speed: 150 },
      idle2:     { src: BASE+'Idle2.png', frames: 10, speed: 150 },
      sleepy:    { src: BASE+'Sleepy.png', frames: 8, speed: 200, once: true },
      laydown:   { src: BASE+'LayDown.png', frames: 12, speed: 140, once: true },
      sleep:     { src: BASE+'Sleep.png', frames: 4, speed: 350 },
      eating:    { src: BASE+'Eating.png', frames: 15, speed: 120 },
      dance:     { src: BASE+'Dance.png', frames: 4, speed: 180 },
      excited:   { src: BASE+'Excited.png', frames: 12, speed: 120 },
      surprised: { src: BASE+'Surprised.png', frames: 12, speed: 100 },
      waiting:   { src: BASE+'Waiting.png', frames: 6, speed: 200 },
      dead:      { src: BASE+'DeadCat.png', frames: 1, speed: 2000 },
      lick:      { src: BASE+'Lick.png', frames: 13, speed: 140 },
      shy:       { src: BASE+'Shy.png', frames: 9, speed: 160 },
      refuse:    { src: BASE+'Refuse.png', frames: 12, speed: 140 },
      despite:   { src: BASE+'Despite.png', frames: 4, speed: 200 },
      sick:      { src: BASE+'catsick1.png', frames: 5, speed: 300 },
    };

    const imgs = {};
    let loaded = 0;
    const total = Object.keys(ANIMS).length;

    for (const [name, a] of Object.entries(ANIMS)) {
      const img = new Image();
      img.onload = img.onerror = () => { imgs[name] = img; if (++loaded >= total) init(); };
      img.src = a.src;
    }

    let curAnim = 'idle', frame = 0, lastT = 0, animCb = null;
    let catFlip = false; // true = face left
    let mochiHidden = false; // true when hidden via tray/menu

    // Atlas rendering: ribbons are 512x512 (16 cols x 16 rows of 32px cells)
    // Skins are 512x640 (16 cols x 20 rows of 32px cells)
    // Animation rows map: each anim name → row index in atlas
    const ATLAS_ANIM_ROWS = {
      idle: 0, idle2: 1, dance: 3, sleepy: 4,
      excited: 5, laydown: 6,
      sleep: 11, surprised: 12, eating: 13, waiting: 14,
      // dead, lick, shy, refuse, despite not in ribbon/skin atlas — fall back to individual sprites
    };
    const ATLAS_COLS = 16;

    let selectedRibbon = localStorage.getItem('selectedRibbon') || null;
    let selectedSkin = localStorage.getItem('selectedSkin') || null;
    let ribbonAtlasImg = null, skinAtlasImg = null;

    function syncInventorySelectionUI() {
      document.querySelectorAll('#ribbon-grid .inv-item').forEach((el) => {
        el.classList.toggle('sel', (el.dataset.ribbon || 'none') === (selectedRibbon || 'none'));
      });
      document.querySelectorAll('#skin-grid .inv-item').forEach((el) => {
        el.classList.toggle('sel', (el.dataset.skin || 'classic') === (selectedSkin || 'classic'));
      });
    }

    function loadAtlas(type, file) {
      if (type === 'ribbon') {
        if (file) {
          skinAtlasImg = null;
          selectedSkin = null;
          localStorage.removeItem('selectedSkin');
        }
        if (!file) {
          ribbonAtlasImg = null;
          selectedRibbon = null;
          localStorage.removeItem('selectedRibbon');
          syncInventorySelectionUI();
          updateInvPreview();
          return;
        }
        selectedRibbon = file;
        localStorage.setItem('selectedRibbon', file);
        syncInventorySelectionUI();
        updateInvPreview();
        const img = new Image();
        img.onload = () => { ribbonAtlasImg = img; updateInvPreview(); };
        img.src = 'assets/cat-pack-paid/CatPackPaid/Sprites/CatwithRibbon/CatPackRibbon' + file + '.png';
      } else {
        if (file) {
          ribbonAtlasImg = null;
          selectedRibbon = null;
          localStorage.removeItem('selectedRibbon');
        }
        if (!file) {
          skinAtlasImg = null;
          selectedSkin = null;
          localStorage.removeItem('selectedSkin');
          syncInventorySelectionUI();
          updateInvPreview();
          return;
        }
        selectedSkin = file;
        localStorage.setItem('selectedSkin', file);
        syncInventorySelectionUI();
        updateInvPreview();
        const img = new Image();
        img.onload = () => { skinAtlasImg = img; updateInvPreview(); };
        img.src = 'assets/cat-pack-paid/CatPackPaid/CatPackDifferentSkins/' + file;
      }
    }

    function tick(t) {
      if (mochiHidden) {
        ctx.clearRect(0, 0, S, S);
        requestAnimationFrame(tick);
        return;
      }

      // Auto-return from click animation
      if (clickAnimEnd && t >= clickAnimEnd) {
        clickAnimEnd = 0;
        play(defaultIdle());
        scheduleCycleAnim();
      }

      const a = ANIMS[curAnim], img = imgs[curAnim];
      if (!a || !img) { requestAnimationFrame(tick); return; }

      // Advance frame on timer
      if (t - lastT >= a.speed) {
        lastT = t;
        frame++;
        if (frame >= a.frames) {
          if (a.once && animCb) { const cb = animCb; animCb = null; cb(); }
          frame = 0;
        }
      }

      // Always redraw current frame (prevents stale canvas / shift)
      const f = Math.min(frame, a.frames - 1);
      ctx.clearRect(0, 0, S, S);
      ctx.save();
      if (catFlip) {
        ctx.translate(S, 0);
        ctx.scale(-1, 1);
      }
      const atlasImgSrc = ribbonAtlasImg || skinAtlasImg;
      const row = ATLAS_ANIM_ROWS[curAnim];
      if (atlasImgSrc && row !== undefined) {
        ctx.drawImage(atlasImgSrc, f * S, row * S, S, S, 0, 0, S, S);
      } else {
        ctx.drawImage(img, f * S, 0, S, S, 0, 0, S, S);
      }
      ctx.restore();

      // Update mini room view if active
      if (showingRoom) renderRoomView();

      requestAnimationFrame(tick);
    }

    function play(name, cb) {
      if (!ANIMS[name]) return;
      curAnim = name; frame = 0; lastT = 0; animCb = cb || null;
    }

    // ═══════ STATE ═══════
    let bedtime = localStorage.getItem('bedtime') || '22:30';
    let alarmTime = localStorage.getItem('alarm') || '07:00';
    let state = 'awake', manualSleep = false;

    // ═══════ STREAK ═══════
    let streakCount = parseInt(localStorage.getItem('streakCount') || '0');
    let streakLastDate = localStorage.getItem('streakLastDate') || '';

    function todayStr() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }
    function yesterdayStr() {
      const d = new Date();
      d.setDate(d.getDate() - 1);
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }
    function updateStreak(onTime) {
      const today = todayStr();
      if (onTime) {
        if (streakLastDate === today) return; // already logged today
        if (streakLastDate === yesterdayStr()) {
          streakCount++;
        } else {
          streakCount = 1; // start new streak
        }
      } else {
        streakCount = 0;
      }
      streakLastDate = today;
      localStorage.setItem('streakCount', streakCount);
      localStorage.setItem('streakLastDate', streakLastDate);
      // Track best streak ever (high-water mark for unlocks)
      const best = parseInt(localStorage.getItem('streakBest') || '0');
      if (streakCount > best) localStorage.setItem('streakBest', streakCount);
      document.getElementById('streak-count').textContent = streakCount;
    }
    // Check if streak was broken (missed yesterday)
    function checkStreakExpiry() {
      if (streakLastDate && streakLastDate !== todayStr() && streakLastDate !== yesterdayStr()) {
        streakCount = 0;
        localStorage.setItem('streakCount', '0');
      }
      document.getElementById('streak-count').textContent = streakCount;
    }

    const msgs = {
      awake: [
        "you're doing great today",
        "proud of you",
        "take it easy, okay?",
        "you matter more than you know",
        "mew~",
        "just checking in on you",
        "remember to drink water",
        "you've got this",
        "hey, you're enough",
        "one step at a time",
        "be gentle with yourself",
      ],
      drowsy: [
        "it's getting late...",
        "you deserve rest",
        "wind down a little?",
        "rest is productive too",
        "mew... sleepy time soon",
        "you did enough today",
      ],
      sleepy: [
        "please go to bed",
        "sleep is important, really",
        "tomorrow needs you rested",
        "you'll feel so much better",
        "zzz... bed... now...",
      ],
      overtired: [
        "i don't feel so good...",
        "please... sleep...",
        "mew... everything hurts...",
        "i'm so tired...",
        "why are we still up...",
      ],
      sleeping: [], waking: ["good morning~", "mew!"]
    };

    // Minutes until a given time (always positive, wraps around midnight)
    function minsTo(ts) {
      const [h, m] = ts.split(':').map(Number);
      const now = new Date(), t = new Date();
      t.setHours(h, m, 0, 0);
      if (t <= now) t.setDate(t.getDate() + 1);
      return (t - now) / 60000;
    }

    // Minutes since bedtime (0 if not in the post-bedtime window)
    // Only counts within 8 hours of bedtime — after that it's "the next day"
    function minsSinceBedtime() {
      const minsToBed = minsTo(bedtime);
      const since = 1440 - minsToBed;
      return since >= 0 && since <= 480 ? since : 0;
    }

    // Whether bedtime has already passed today (we're in the post-bedtime window)
    function isPastBedtime() {
      return minsSinceBedtime() > 0;
    }

    // Overtired: 10 mins to 2 hours after bedtime (sick animation window)
    function isOvertired() {
      const since = minsSinceBedtime();
      return since >= 10 && since <= 240;
    }

    // Missed bedtime: more than 4 hours past bedtime but still within the night window
    let missedBedtimeAcknowledged = false;
    function hasMissedBedtime() {
      const since = minsSinceBedtime();
      return since > 240 && since <= 480;
    }


    // Animation cycling — Mochi does random things based on state
    let idleTimer = null;

    function randomAwakeAnim() {
      const anims = ['idle', 'idle2', 'waiting', 'dance', 'surprised', 'lick', 'shy'];
      const weights = [25, 25, 15, 12, 10, 8, 5]; // weighted random
      let total = weights.reduce((a, b) => a + b, 0);
      let r = Math.random() * total;
      for (let i = 0; i < anims.length; i++) {
        r -= weights[i];
        if (r <= 0) return anims[i];
      }
      return 'idle';
    }

    // How sleepy should Mochi be? 0 = wide awake, 1 = bedtime
    function sleepiness() {
      if (isPastBedtime()) return 1; // already past bedtime
      const mins = minsTo(bedtime);
      if (mins >= 120) return 0;
      return 1 - (mins / 120); // ramps from 0 to 1 over 2 hours
    }

    function defaultIdle() {
      const s = sleepiness();
      if (s > 0.5) return 'idle2';
      return Math.random() > 0.5 ? 'idle' : 'idle2';
    }

    function scheduleCycleAnim() {
      clearTimeout(idleTimer);
      if (state === 'sleeping' || manualSleep || followingMouse) return;

      const s = sleepiness();
      // When very sleepy, barely get up at all
      const delay = s > 0.5 ? 2000 + Math.random() * 3000 : 4000 + Math.random() * 8000;

      idleTimer = setTimeout(() => {
        if (state === 'sleeping' || manualSleep || followingMouse) return;

        // Lie down probability: aggressive — at s=0.5 already 80%, at s=1 → 97%
        const lieDownChance = 0.15 + s * 0.82;

        if (Math.random() < lieDownChance) {
          play('laydown', () => {
            // Stay down much longer when sleepy: 15-60s+ near bedtime
            const restTime = Math.max(15000, 12000 + s * 50000 + Math.random() * 15000);
            setTimeout(() => {
              if (state === 'sleeping' || manualSleep || followingMouse) return;
              // When very sleepy, often just stay lying down (re-laydown)
              if (s > 0.6 && Math.random() < s * 0.8) {
                play('laydown', () => scheduleCycleAnim());
                return;
              }
              play(defaultIdle());
              setTimeout(() => scheduleCycleAnim(), 10000 + Math.random() * 5000);
            }, restTime);
          });
          return;
        }

        // Awake/drowsy animations
        if (state === 'awake') {
          const next = randomAwakeAnim();
          play(next, () => {
            play(defaultIdle());
            scheduleCycleAnim();
          });
        } else if (state === 'drowsy') {
          const drowsyAnims = ['sleepy', 'waiting', 'idle2'];
          const pick = drowsyAnims[Math.floor(Math.random() * drowsyAnims.length)];
          play(pick, () => {
            play(defaultIdle());
            scheduleCycleAnim();
          });
        } else if (state === 'sleepy') {
          play('sleepy', () => {
            play(defaultIdle());
            scheduleCycleAnim();
          });
        }
      }, delay);
    }

    // ═══════ BEDTIME REMINDERS ═══════
    let lastReminder = '';

    function checkBedtimeReminders() {
      if (manualSleep || state === 'sleeping') return;
      const since = minsSinceBedtime();
      const mins = minsTo(bedtime);
      let key = '';

      if (since > 0 && since <= 5) key = 'now';
      else if (mins <= 30 && mins > 29) key = '30';
      else if (mins <= 60 && mins > 59) key = '60';
      else if (mins <= 120 && mins > 119) key = '120';

      if (key && key !== lastReminder) {
        lastReminder = key;
        if (key === '120') {
          showBubbleMsg("bedtime in 2 hours~");
          play('sleepy', () => play(defaultIdle()));
        } else if (key === '60') {
          showBubbleMsg("1 hour til bed...");
          play('sleepy', () => { play('idle2'); scheduleCycleAnim(); });
          window.electronAPI?.notify('Mochi', 'bedtime in 1 hour~');
        } else if (key === '30') {
          showBubbleMsg("start winding down...");
          play('sleepy', () => play('laydown'));
          window.electronAPI?.notify('Mochi', 'maybe start thinking about sleep?');
        } else if (key === 'now') {
          showBubbleMsg("it's bedtime...");
          play('sleepy', () => play('laydown', () => play('sleep')));
          window.electronAPI?.notify('Mochi', 'it\'s bedtime... goodnight?');
        }
      }
    }

    function showBubbleMsg(text) {
      if (mochiHidden) return;
      const b = document.getElementById('bubble');
      b.textContent = text;
      b.classList.add('show');
      clearTimeout(bubbleTimer);
      bubbleTimer = setTimeout(() => b.classList.remove('show'), 6000);
    }

    // ═══════ GOODNIGHT CUTSCENE ═══════
    function goodnightCutscene() {
      manualSleep = true;
      clearTimeout(idleTimer);
      menuOpen = false;
      document.getElementById('menu').classList.remove('open');

      // Record streak — on time if pressed before or within 10 mins of bedtime
      const onTime = !isPastBedtime() || minsSinceBedtime() <= 10;
      updateStreak(onTime);
      if (onTime && streakCount > 1) {
        showBubbleMsg(streakCount + " nights in a row~ so proud of you");
      } else if (onTime) {
        showBubbleMsg("goodnight~ sleep well");
      } else {
        showBubbleMsg("better late than never~ sleep well");
      }
      play('sleepy', () => {
        play('laydown', () => {
          // Step 2: Show room view if not already
          if (!showingRoom) {
            showingRoom = true;
            localStorage.setItem('showRoom', 'true');
            roomViewCanvas.classList.add('show');
            canvas.style.display = 'none';
            document.getElementById('viewroom-btn').textContent = 'Hide Room';
            loadRoomView();
          }
          // Step 3: Sleep
          play('sleep');
          state = 'sleeping';
          document.getElementById('goodnight-btn').textContent = 'Wake Up';
        });
      });
    }

    function wakeUp() {
      manualSleep = false;
      state = 'waking';
      play('excited', () => {
        state = 'awake';
        play(defaultIdle());
        scheduleCycleAnim();
      });
      document.getElementById('goodnight-btn').textContent = 'Goodnight';
      showBubbleMsg("good morning~");
    }

    function setState(s) {
      if (s === state) return;
      state = s;
      switch (s) {
        case 'awake':
          play(defaultIdle());
          scheduleCycleAnim();
          break;
        case 'drowsy':
          play('sleepy', () => { play(defaultIdle()); scheduleCycleAnim(); });
          break;
        case 'sleepy':
          play('sleepy');
          scheduleCycleAnim();
          break;
        case 'sleeping':
          clearTimeout(idleTimer);
          play('laydown', () => play('sleep'));
          break;
        case 'overtired':
          clearTimeout(idleTimer);
          play('sick');
          break;
        case 'waking':
          play('excited', () => setState('awake'));
          break;
      }
      showBubble();
    }

    function checkState() {
      if (manualSleep || followingMouse) return;
      // Sick animation: 10 mins to 2 hours after bedtime
      if (isOvertired()) {
        if (state !== 'overtired') setState('overtired');
        checkBedtimeReminders();
        return;
      }

      // Missed bedtime: past the sick window, goodnight was never pressed
      // Also handles transition out of overtired state
      if ((hasMissedBedtime() || (state === 'overtired' && !isOvertired())) && !missedBedtimeAcknowledged) {
        missedBedtimeAcknowledged = true;
        updateStreak(false); // break the streak
        state = 'awake';
        play('waiting', () => {
          showBubbleMsg("you missed bedtime... please sleep tonight");
          play(defaultIdle());
          scheduleCycleAnim();
        });
        return;
      }

      // Reset the missed flag when we're approaching bedtime again (new day cycle)
      if (minsTo(bedtime) <= 120) {
        missedBedtimeAcknowledged = false;
      }

      // First 10 mins past bedtime = still sleepy state
      const since = minsSinceBedtime();
      let s;
      if (since > 0 && since <= 10) {
        s = 'sleepy';
      } else {
        const mins = minsTo(bedtime);
        s = mins <= 15 ? 'sleepy' : mins <= 60 ? 'drowsy' : 'awake';
      }
      if (s !== state) setState(s);
      checkBedtimeReminders();
    }

    function fmt12(timeStr) {
      const [h, m] = timeStr.split(':').map(Number);
      const ampm = h >= 12 ? 'PM' : 'AM';
      const h12 = h % 12 || 12;
      return h12 + ':' + String(m).padStart(2, '0') + ' ' + ampm;
    }

    function adjustTime(timeStr, deltaMins) {
      let [h, m] = timeStr.split(':').map(Number);
      let total = h * 60 + m + deltaMins;
      if (total < 0) total += 1440;
      total = total % 1440;
      return String(Math.floor(total / 60)).padStart(2, '0') + ':' + String(total % 60).padStart(2, '0');
    }

    function updateSleepInfo() {
      document.getElementById('bed-display').textContent = fmt12(bedtime);
      document.getElementById('alarm-display').textContent = fmt12(alarmTime);

      const [bH, bM] = bedtime.split(':').map(Number);
      const [aH, aM] = alarmTime.split(':').map(Number);
      let bed = bH * 60 + bM, alm = aH * 60 + aM;
      if (alm <= bed) alm += 1440;
      const t = alm - bed, h = Math.floor(t / 60), m = t % 60;
      document.getElementById('sleep-dur').textContent = h + 'h ' + m + 'm';
      document.getElementById('bar-fill').style.width = Math.min((t / 420) * 100, 100) + '%';
      let color, text;
      if (t < 300) { color = '#FF6B6B'; text = 'not enough'; }
      else if (t < 360) { color = '#FFA76B'; text = 'could be more'; }
      else if (t < 420) { color = '#FFD96B'; text = 'almost there'; }
      else { color = '#6BFFB8'; text = 'perfect'; }
      document.getElementById('bar-fill').style.background = color;
      const q = document.getElementById('sleep-qual');
      q.textContent = text; q.style.color = color;
    }

      if (selectedRibbon && isUnlocked(RIBBONS.find(r => r.color === selectedRibbon)?.streak || 0)) {
        loadAtlas('ribbon', selectedRibbon);

    // ═══════ INIT ═══════
    function init() {
      setupClickThrough();

      // Time picker +/- buttons (15 min increments)
      document.querySelectorAll('.time-btn').forEach(btn => {
        btn.onclick = () => {
          const target = btn.dataset.target;
          const dir = parseInt(btn.dataset.dir);
          if (target === 'bedtime') {
            bedtime = adjustTime(bedtime, dir * 15);
            localStorage.setItem('bedtime', bedtime);
          } else {
            alarmTime = adjustTime(alarmTime, dir * 15);
            localStorage.setItem('alarm', alarmTime);
          }
          updateSleepInfo();
          if (!manualSleep) checkState();
        };
      });

      // Cat click — single = random anim, double = menu
      canvas.addEventListener('click', onCatClick);

      // Menu buttons
      document.querySelectorAll('.menu-btn').forEach(btn => {
        btn.onclick = () => {
          const action = btn.dataset.action;
          if (action === 'goodnight') {
            if (state === 'sleeping' || manualSleep) { wakeUp(); }
            else { goodnightCutscene(); }
          } else if (action === 'room') {
            menuOpen = false;
            document.getElementById('menu').classList.remove('open');
            window.electronAPI?.openRoom();
          } else if (action === 'viewroom') {
            menuOpen = false;
            document.getElementById('menu').classList.remove('open');
            toggleRoomView();
          } else if (action === 'hide') {
            menuOpen = false;
            document.getElementById('menu').classList.remove('open');
            window.electronAPI?.hideMochi();
          } else if (action === 'follow') {
            menuOpen = false;
            document.getElementById('menu').classList.remove('open');
            window.electronAPI?.toggleFollow(!followingMouse);
          } else if (action === 'quit') {
            window.electronAPI?.quit();
          } else {
            openPanel(action + '-panel');
          }
        };
      });

      // Close buttons
      document.querySelectorAll('.panel-close').forEach(btn => {
        btn.onclick = () => closePanel();
      });

      setupInventory();
      updateSleepInfo();
      updateInvPreview();

      // Restore follow-mouse state
      if (followingMouse) {
        document.getElementById('follow-btn').textContent = 'Stop Following';
        window.electronAPI?.toggleFollow(true);
      }

      // Follow mode is owned by the main process so tray/menu/shortcut stay in sync
      window.electronAPI?.onFollowState?.((enabled) => {
        applyFollowState(enabled);
      });
      window.electronAPI?.onStopFollow?.(() => {
        applyFollowState(false);
      });

      // Listen for cursor direction during follow mode to flip cat
      window.electronAPI?.onCursorDir?.((dir) => {
        if (followingMouse) catFlip = (dir === 'right');
      });

      // Listen for hide/show from main process
      window.electronAPI?.onMochiVisible?.((visible) => {
        mochiHidden = !visible;
        if (mochiHidden) {
          // Close any open UI
          menuOpen = false;
          document.getElementById('menu').classList.remove('open');
          if (activePanel) { document.getElementById(activePanel).classList.remove('open'); activePanel = null; }
          document.getElementById('bubble').classList.remove('show');
          ctx.clearRect(0, 0, S, S);
        }
      });

      // Cmd+Shift+M shortcut opens the cat's menu
      window.electronAPI?.onOpenMenu?.(() => {
        if (!menuOpen && !activePanel) {
          toggleMenu();
        }
      });

      // Restore room view state
      if (showingRoom) {
        roomViewCanvas.classList.add('show');
        canvas.style.display = 'none';
        document.getElementById('viewroom-btn').textContent = 'Hide Room';
        loadRoomView();
      }

      // Room view: drag to reposition; single click = menu (after delay), double click = editor (same timing as cat)
      let rvDragging = false, rvStartX, rvStartY, rvOrigLeft, rvOrigTop, rvMoved;
      let roomViewClickTimer = null;
      roomViewCanvas.addEventListener('mousedown', (e) => {
        rvDragging = true; rvMoved = false;
        rvStartX = e.clientX; rvStartY = e.clientY;
        rvOrigLeft = roomViewCanvas.offsetLeft; rvOrigTop = roomViewCanvas.offsetTop;
        e.preventDefault();
      });
      document.addEventListener('mousemove', (e) => {
        if (!rvDragging) return;
        const dx = e.clientX - rvStartX, dy = e.clientY - rvStartY;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) rvMoved = true;
        roomViewCanvas.style.left = (rvOrigLeft + dx) + 'px';
        roomViewCanvas.style.top = (rvOrigTop + dy) + 'px';
        roomViewCanvas.style.right = 'auto';
        roomViewCanvas.style.bottom = 'auto';
      });
      document.addEventListener('mouseup', () => { rvDragging = false; });
      roomViewCanvas.addEventListener('click', () => {
        if (rvMoved) { rvMoved = false; return; }
        if (roomViewClickTimer) {
          clearTimeout(roomViewClickTimer);
          roomViewClickTimer = null;
          window.electronAPI?.openRoom();
        } else {
          roomViewClickTimer = setTimeout(() => {
            roomViewClickTimer = null;
            toggleMenu();
          }, 250);
        }
      });

      // Periodic room view refresh (picks up changes from editor)
      setInterval(() => {
        if (showingRoom) { loadRoomView(); renderRoomView(); }
      }, 2000);

      // Check if bedtime has not been set yet — prompt
      if (!localStorage.getItem('bedtime')) {
        setTimeout(() => showBubbleMsg("when do you go to bed? tell me in settings~"), 3000);
      }

      checkStreakExpiry();
      setState('awake');
      checkState(); // immediately check where we are relative to bedtime
      requestAnimationFrame(tick);

      setInterval(showBubble, 90000);
      setInterval(checkState, 15000); // check more often for bedtime reminders
    }
  </script>
</body>
</html>
