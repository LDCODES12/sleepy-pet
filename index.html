        atlasImg.src = atlasPath;

        item.onclick = () => {
          if (locked) return;
          loadAtlas('ribbon', rb.color);
        };
        rg.appendChild(item);
      }

      // Skins
      const sg = document.getElementById('skin-grid');
      for (const skin of SKINS) {
        const item = document.createElement('div');
        const locked = !isUnlocked(skin.streak);
        item.className = 'inv-item' + (locked ? ' locked' : '');
        item.dataset.skin = skin.file || 'classic';

        if (skin.file) {
          const thumb = document.createElement('canvas');
          thumb.width = 32; thumb.height = 32;
          item.appendChild(thumb);
          const atlasImg = new Image();
          atlasImg.onload = () => drawAtlasThumb(thumb, atlasImg);
          atlasImg.src = SKIN_BASE + skin.file;
        } else {
          const thumb = document.createElement('canvas');
          thumb.width = 32; thumb.height = 32;
          item.appendChild(thumb);
          const drawClassic = () => {
            if (imgs.idle) drawAtlasThumb(thumb, imgs.idle);
          };
          if (imgs.idle) drawClassic();
          else setTimeout(drawClassic, 500);
        }

        if (locked) {
          const lock = document.createElement('div');
          lock.className = 'inv-lock';
          lock.innerHTML = '<span class="inv-lock-icon">&#x1f512;</span>' + skin.streak + ' streak';
          item.appendChild(lock);
        }

        item.onclick = () => {
          if (locked) return;
          loadAtlas('skin', skin.file);
        };
        sg.appendChild(item);
      }

      syncInventorySelectionUI();

      // Load saved selections (only if still unlocked)
      if (selectedRibbon && isUnlocked(RIBBONS.find(r => r.color === selectedRibbon)?.streak || 0)) {
        loadAtlas('ribbon', selectedRibbon);
      } else if (selectedSkin && isUnlocked(SKINS.find(s => s.file === selectedSkin)?.streak || 0)) {
        loadAtlas('skin', selectedSkin);
      }
    }

    // ═══════ INIT ═══════
    function init() {
      setupClickThrough();

      // Time picker +/- buttons (15 min increments)
      document.querySelectorAll('.time-btn').forEach(btn => {
        btn.onclick = () => {
          const target = btn.dataset.target;
          const dir = parseInt(btn.dataset.dir);
          if (target === 'bedtime') {
            bedtime = adjustTime(bedtime, dir * 15);
            localStorage.setItem('bedtime', bedtime);
          } else {
            alarmTime = adjustTime(alarmTime, dir * 15);
            localStorage.setItem('alarm', alarmTime);
          }
          updateSleepInfo();
          if (!manualSleep) checkState();
        };
      });

      // Cat click — single = random anim, double = menu
      canvas.addEventListener('click', onCatClick);
      window.addEventListener('keydown', (e) => {
        if ((e.key || '').toLowerCase() === 'd') forceDeadClick = true;
      });
      window.addEventListener('keyup', (e) => {
        if ((e.key || '').toLowerCase() === 'd') forceDeadClick = false;
      });
      window.addEventListener('blur', () => {
        forceDeadClick = false;
      });

      // Menu buttons
      document.querySelectorAll('.menu-btn').forEach(btn => {
        btn.onclick = () => {
          const action = btn.dataset.action;
          if (action === 'goodnight') {
            if (state === 'sleeping' || manualSleep) { wakeUp(); }
            else { goodnightCutscene(); }
          } else if (action === 'room') {
            menuOpen = false;
            document.getElementById('menu').classList.remove('open');
            window.electronAPI?.openRoom();
          } else if (action === 'viewroom') {
            menuOpen = false;
            document.getElementById('menu').classList.remove('open');
            toggleRoomView();
          } else if (action === 'hide') {
            menuOpen = false;
            document.getElementById('menu').classList.remove('open');
            window.electronAPI?.hideMochi();
          } else if (action === 'follow') {
            menuOpen = false;
            document.getElementById('menu').classList.remove('open');
            window.electronAPI?.toggleFollow(!followingMouse);
          } else if (action === 'update') {
            menuOpen = false;
            document.getElementById('menu').classList.remove('open');
            window.electronAPI?.installUpdateNow?.();
          } else if (action === 'quit') {
            window.electronAPI?.quit();
          } else {
            openPanel(action + '-panel');
          }
        };
      });
      // Close buttons
      document.querySelectorAll('.panel-close').forEach(btn => {
        btn.onclick = () => closePanel();
      });

      setupInventory();
      updateSleepInfo();
      updateInvPreview();
      canvas.classList.toggle('follow-mode', followingMouse);

      // Restore follow-mouse state
      if (followingMouse) {
        document.getElementById('follow-btn').textContent = 'Stop Following';
        window.electronAPI?.toggleFollow(true);
      }

      // Follow mode is owned by the main process so tray/menu/shortcut stay in sync
      window.electronAPI?.onFollowState?.((enabled) => {
        applyFollowState(enabled);
      });
      window.electronAPI?.onStopFollow?.(() => {
        applyFollowState(false);
      });

      // Listen for cursor direction during follow mode to flip cat
      window.electronAPI?.onCursorDir?.((dir) => {
        if (followingMouse) catFlip = (dir === 'right');
      });

      // Listen for hide/show from main process
      window.electronAPI?.onMochiVisible?.((visible) => {
        mochiHidden = !visible;
        if (mochiHidden) {
          // Close any open UI
          menuOpen = false;
          document.getElementById('menu').classList.remove('open');
          if (activePanel) { document.getElementById(activePanel).classList.remove('open'); activePanel = null; }
          document.getElementById('bubble').classList.remove('show');
          ctx.clearRect(0, 0, CAT_STAGE_W, CAT_STAGE_H);
        }
      });

      // Cmd+Shift+M shortcut opens the cat's menu
      window.electronAPI?.onOpenMenu?.(() => {
        if (!menuOpen && !activePanel) {
          toggleMenu();
        }
      });
      window.electronAPI?.onUpdateState?.((state) => {
        applyUpdateState(state);
      });

      // Restore room view state
      if (showingRoom) {
        roomViewWrap.classList.add('show');
        canvas.style.display = 'none';
        document.getElementById('viewroom-btn').textContent = 'Hide Room';
        loadRoomView();
      }

      function rvActivateControl(control) {
        if (control === 'play') {
          menuOpen = false;
          document.getElementById('menu').classList.remove('open');
          rvSetPlaying(!roomViewPlaying);
        } else if (control === 'edit') {
          rvSetPlaying(false);
          menuOpen = false;
          document.getElementById('menu').classList.remove('open');
          window.electronAPI?.openRoom();
        }
      }

      // Room view: drag when paused; double-click opens the menu, never the editor.
      let roomViewClickTimer = null;
      roomViewCanvas.addEventListener('mousedown', (e) => {
        const point = rvCanvasPixelCoords(e);
        rvPointerCanvasPoint = point;
        const control = rvRefreshPointerState({ point, follow: false });
        if (control) {
          rvControlPressed = control;
          rvLastToyTarget = null;
          rvSetRoomCursor();
          e.preventDefault();
          return;
        }
        rvControlPressed = null;
        rvDragging = true; rvMoved = false;
        rvToyInside = false;
        rvLastToyTarget = null;
        rvStartX = e.clientX; rvStartY = e.clientY;
        rvOrigLeft = roomViewWrap.offsetLeft; rvOrigTop = roomViewWrap.offsetTop;
        rvSetRoomCursor();
        e.preventDefault();
      });
      document.addEventListener('mousemove', (e) => {
        if (!rvDragging) {
          rvTrackPointerEvent(e, true);
          return;
        }
        const dx = e.clientX - rvStartX, dy = e.clientY - rvStartY;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) rvMoved = true;
        roomViewWrap.style.left = (rvOrigLeft + dx) + 'px';
        roomViewWrap.style.top = (rvOrigTop + dy) + 'px';
        roomViewWrap.style.right = 'auto';
        roomViewWrap.style.bottom = 'auto';
      });
      document.addEventListener('mouseup', (e) => {
        rvDragging = false;
        rvTrackPointerEvent(e, false);
        rvSetRoomCursor();
      });
      roomViewCanvas.addEventListener('click', (e) => {
        const point = rvCanvasPixelCoords(e);
        const control = rvRefreshPointerState({ point, follow: false });
        if (rvControlPressed && control === rvControlPressed) {
          rvActivateControl(control);
          rvControlPressed = null;
          return;
        }
        rvControlPressed = null;
        if (rvMoved) { rvMoved = false; return; }
        if (roomViewClickTimer) {
          clearTimeout(roomViewClickTimer);
          roomViewClickTimer = null;
          toggleMenu();
        } else {
          roomViewClickTimer = setTimeout(() => {
            roomViewClickTimer = null;
          }, 250);
        }
      });

      roomViewCanvas.addEventListener('mousemove', (e) => {
        rvTrackPointerEvent(e, true);
      });
      roomViewCanvas.addEventListener('mouseenter', (e) => {
        rvTrackPointerEvent(e, true);
      });
      roomViewCanvas.addEventListener('mouseleave', () => {
        rvControlPressed = null;
        rvClearPointerState();
        rvSetRoomCursor();
      });

      // Periodic room view refresh (picks up changes from editor)
      setInterval(() => {
        if (showingRoom) { loadRoomView(); renderRoomView(); }
      }, 2000);

      // Check if bedtime has not been set yet — prompt
      if (!localStorage.getItem('bedtime')) {
        setTimeout(() => showBubbleMsg("when do you go to bed? tell me in settings~"), 3000);
      }

      checkStreakExpiry();
      setState('awake');
      checkState(); // immediately check where we are relative to bedtime
      requestAnimationFrame(tick);

      setInterval(showBubble, 90000);
      setInterval(() => {
        if (updateReadyVersion && updateNagNeedsAck) showBubble();
      }, 30000);
      setInterval(checkState, 15000); // check more often for bedtime reminders
    }
  </script>
</body>
